// ── Firebase Realtime Database helpers ───────────────────────────────────────
let _db = null;
function getDB() { return _db; }

function firebasePath(key) {
  // Nettoyer la clé pour Firebase (pas de . # $ [ ])
  return key.replace(/[.#$\[\]]/g, '_');
}

async function fbSet(path, value) {
  try {
    const url = FIREBASE_CONFIG.databaseURL + '/' + path + '.json?auth=' + FIREBASE_CONFIG.apiKey;
    await fetch(url, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(value)
    });
  } catch(e) { console.warn('fbSet error:', e); }
}

async function fbGet(path) {
  try {
    const url = FIREBASE_CONFIG.databaseURL + '/' + path + '.json';
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    return data;
  } catch(e) { return null; }
}

async function fbGetAll(path) {
  try {
    const url = FIREBASE_CONFIG.databaseURL + '/' + path + '.json';
    const r = await fetch(url);
    if (!r.ok) return {};
    const data = await r.json();
    return data || {};
  } catch(e) { return {}; }
}

async function fbDelete(path) {
  try {
    const url = FIREBASE_CONFIG.databaseURL + '/' + path + '.json?auth=' + FIREBASE_CONFIG.apiKey;
    await fetch(url, { method: 'DELETE' });
  } catch(e) {}
}

// ── window.storage — API compatible artifact, backed by Firebase ──────────────
// shared=true  → Firebase (visible des 2 tablettes)
// shared=false → localStorage (profil local)
window.storage = {
  _local: {},

  async get(key, shared) {
    if (!shared) {
      // Local : localStorage
      try {
        const v = localStorage.getItem('pr_' + key);
        if (v === null) throw new Error('nf');
        return { key, value: v, shared: false };
      } catch(e) { throw e; }
    }
    // Shared : Firebase
    const clean = firebasePath(key);
    const val = await fbGet('shared/' + clean);
    if (val === null) throw new Error('not found');
    return { key, value: typeof val === 'string' ? val : JSON.stringify(val), shared: true };
  },

  async set(key, value, shared) {
    const sv = typeof value === 'string' ? value : JSON.stringify(value);
    if (!shared) {
      try { localStorage.setItem('pr_' + key, sv); } catch(e) {}
      return { key, value: sv, shared: false };
    }
    // Shared : Firebase
    const clean = firebasePath(key);
    await fbSet('shared/' + clean, sv);
    return { key, value: sv, shared: true };
  },

  async delete(key, shared) {
    if (!shared) {
      localStorage.removeItem('pr_' + key);
      return { key, deleted: true, shared: false };
    }
    await fbDelete('shared/' + firebasePath(key));
    return { key, deleted: true, shared: true };
  },

  async list(prefix, shared) {
    if (!shared) {
      const keys = [];
      const p = 'pr_' + (prefix || '');
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(p)) keys.push(k.replace('pr_', ''));
      }
      return { keys, prefix, shared: false };
    }
    // Shared : lister les clés Firebase sous shared/
    const all = await fbGetAll('shared');
    const cleanPrefix = firebasePath(prefix || '');
    const keys = Object.keys(all)
      .filter(k => k.startsWith(cleanPrefix))
      .map(k => k.replace(/_/g, match => {
        // Reverse : on garde tel quel car les clés sont déjà nettoyées
        return match;
      }));
    return { keys, prefix, shared: true };
  }
};

// ── React hooks ───────────────────────────────────────────────────────────────

// ── Cache & mount ─────────────────────────────────────────────────────────────
const CACHE_KEY = 'cvac_5ee67e48';

function setBar(p) { const b=document.getElementById('bar'); if(b) b.style.width=p+'%'; }
function setSub(t) { const s=document.getElementById('sub'); if(s) s.textContent=t; }
function hideSplash() {
  const s=document.getElementById('splash');
  if(s) { s.classList.add('hide'); setTimeout(()=>s.remove(), 500); }
}

function mountFromCode(code) {
  try {
    eval(code);
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    setTimeout(hideSplash, 200);
  } catch(e) {
    setSub('Erreur: ' + e.message.slice(0,80));
    console.error('Mount error:', e);
  }
}

function compileAndMount() {
  // Vérifier cache localStorage
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      setSub('Chargement rapide \u26a1'); setBar(95);
      setTimeout(() => { setBar(100); mountFromCode(cached); }, 50);
      return;
    }
  } catch(e) {}

  setSub('Première ouverture : compilation...'); setBar(35);
  const jsx = document.getElementById('jsx-src').textContent;

  setTimeout(() => {
    setBar(55);
    setTimeout(() => {
      try {
        const result = Babel.transform(jsx, {
          presets: [['react', {runtime:'classic'}]],
          sourceMaps: false,
          comments: false,
          compact: true,
        });
        setBar(85); setSub('Démarrage...');
        try { localStorage.setItem(CACHE_KEY, result.code); } catch(e) {}
        setTimeout(() => { setBar(100); mountFromCode(result.code); }, 80);
      } catch(e) {
        setSub('Erreur compilation: ' + e.message.slice(0,60));
        console.error('Babel error:', e);
      }
    }, 100);
  }, 50);
}

function loadBabel(urls, idx) {
  if (idx >= urls.length) {
    setSub('Erreur réseau. Vérifiez votre connexion et rechargez.');
    return;
  }
  setSub('Chargement (' + (idx+1) + '/3)...'); setBar(15);
  const s = document.createElement('script');
  s.src = urls[idx];
  s.onload = () => compileAndMount();
  s.onerror = () => { setSub('CDN ' + (idx+1) + ' indispo, essai suivant...'); loadBabel(urls, idx+1); };
  document.head.appendChild(s);
}

window.addEventListener('load', () => {
  // Cache dispo → pas besoin de Babel
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      setSub('Chargement rapide \u26a1'); setBar(90);
      setTimeout(() => { setBar(100); mountFromCode(cached); }, 100);

    'https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js',

});

async function generateQuestion(subject,level,prevTopics=[],forceTopic=null,examMode=false){
  const lv=LEVELS.find(l=>l.id===level);
  const sub=SUBJECTS.find(s=>s.id===subject)||SUBJECTS[0];
  const forceStr=forceTopic?`\nFORCE thème: "${forceTopic}".`:"";

  const examStr=examMode?"\nMode examen: favorise des questions exigeantes, varie les difficultés.":"";

  const system=`Tu génères des questions éducatives LUDIQUES et IMMERSIVES pour enfants niveau ${lv.from}→${lv.to}.
Le personnage narrateur s'appelle "${sub.mascotName}" (${sub.mascot}).
La mise en scène actuelle est: "${sub.scenarios[0].scene}".

RÉPONDS UNIQUEMENT en JSON valide, sans markdown ni backticks.
QCM: {"question":"...","type":"qcm","choices":["A) ...","B) ...","C) ...","D) ..."],"answer":"A","explanation":"...","topic":"...","context":"...","hint":"..."}
Ouvert: {"question":"...","type":"open","answer":"...","explanation":"...","topic":"...","context":"...","hint":"..."}

Règles IMPORTANTES:
- question: formulée comme une MISSION ou une SITUATION (ex: "L'explorateur trouve 3 coffres avec 24 pièces chacun. Combien en tout ?")
- context: courte phrase d'ambiance narrative (1-2 mots max, style BD), ex: "⚠️ Alarme !", "🌀 Mystère...", "💣 Urgent !"
- hint: indice rigolo en 1 phrase si bloqué (ex: "Psst... pense aux tables de 3 !")
- explanation: fun, comme si le personnage parlait à l'enfant
- answer: lettre seule pour qcm, réponse courte pour open
- topic: 2-3 mots${avoidStr}${forceStr}${examStr}`;

  const prompts={
    maths:`Question maths ${lv.from}→${lv.to} avec mise en situation aventure/mission. Calcul, fractions, géométrie, mesures, problèmes, tables.`,
    francais:`Question français ${lv.from}→${lv.to} avec mise en situation narrative. Conjugaison, grammaire, orthographe, vocabulaire, accords.`,
    anglais:`Question anglais pour francophones ${lv.from}→${lv.to} avec situation de voyage/aventure. Question en français, réponse en anglais.`,

    sciences:`Question sciences ${lv.from}→${lv.to} avec mise en situation expérience/exploration. Corps humain, animaux, végétaux, espace.`,
    mix:`Question aléatoire parmi toutes matières niveau ${lv.from}→${lv.to}, avec mise en situation narrative.`,
  };

  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},

      messages:[{role:"user",content:prompts[subject]||prompts.mix}]}),
  });
  const data=await res.json();
  const text=(data.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
  return JSON.parse(text);
}

    size:type==="win"?16+Math.random()*14:18,
  }));
  return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:8000,overflow:"hidden"}}>
    {particles.map(p=>(
      <div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:"60%",fontSize:p.size,
        animation:`particle${type} ${p.dur}s ease-out ${p.delay}s both`}}>
        {p.emoji}
      </div>
    ))}
    <style>{`
      @keyframes particlewin{0%{transform:translateY(0) scale(0.5) rotate(0deg);opacity:1}100%{transform:translateY(-220px) scale(1.2) rotate(${Math.random()>0.5?'':'- '}360deg);opacity:0}}
      @keyframes particlelose{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(80px) scale(0.5);opacity:0}}
    `}</style>
  </div>;
}

// ─── MASCOT ANIMATOR ─────────────────────────────────────────────────────────────
function Mascot({emoji,state,size=56}){
  // state: idle|talk|correct|wrong|thinking
  const anims={
    idle:"mascotIdle 2s ease-in-out infinite",
    talk:"mascotTalk 0.4s ease-in-out infinite alternate",
    correct:"mascotCorrect 0.6s cubic-bezier(0.34,1.56,0.64,1)",
    wrong:"mascotWrong 0.5s ease-in-out",
    thinking:"mascotThink 1.5s ease-in-out infinite",
  };
  return <div style={{fontSize:size,display:"inline-block",animation:anims[state]||anims.idle,filter:state==="correct"?"drop-shadow(0 0 12px #4ade80)":state==="wrong"?"drop-shadow(0 0 12px #f87171)":"drop-shadow(0 4px 8px rgba(0,0,0,0.5))"}}>
    {emoji}
    <style>{`
      @keyframes mascotIdle{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
      @keyframes mascotTalk{from{transform:scale(1) rotate(-3deg)}to{transform:scale(1.08) rotate(3deg)}}
      @keyframes mascotCorrect{0%{transform:scale(1)}30%{transform:scale(1.4) rotate(15deg)}60%{transform:scale(0.9) rotate(-10deg)}100%{transform:scale(1) rotate(0)}}
      @keyframes mascotWrong{0%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-10deg)}40%{transform:translateX(10px) rotate(10deg)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}100%{transform:translateX(0) rotate(0)}}
      @keyframes mascotThink{0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(5deg) translateY(-4px)}}
    `}</style>
  </div>;
}

// ─── QUIZ LUDIQUE ─────────────────────────────────────────────────────────────────
function QuizScreen({profile,subjectId,forceTopic,examMode,onBack,onEarnStars,voiceEnabled=false}){
  const speechSupported=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
  const voiceLang=(sid)=>sid==="anglais"?"en-GB":"fr-FR";
  const [autoRead,setAutoRead]=useState(false);
  const theme=THEMES[profile.theme];
  const weekend=isWeekend(); const MULT=weekend?2:1;
  const SESSION=examMode?20:8;
  const subjectList=["maths","francais","anglais","histoire","sciences"];
  const getSubId=()=>examMode?subjectList[Math.floor(asked/4)%subjectList.length]:subjectId;
  const getSub=(id)=>SUBJECTS.find(s=>s.id===id)||SUBJECTS[0];

  const [q,setQ]=useState(null), [loading,setLoading]=useState(true), [error,setError]=useState(null);
  const [selected,setSelected]=useState(null), [openAns,setOpenAns]=useState("");
  const [revealed,setRevealed]=useState(false), [feedback,setFeedback]=useState(null);
  const [score,setScore]=useState(0), [asked,setAsked]=useState(0);
  const [prevTopics,setPrevTopics]=useState([]), [streak,setStreak]=useState(0);
  const [badgePopup,setBadgePopup]=useState(null), [particles,setParticles]=useState(null);
  const [mascotState,setMascotState]=useState("idle");
  const [showHint,setShowHint]=useState(false), [hintUsed,setHintUsed]=useState(false);
  const [sceneIdx,setSceneIdx]=useState(0);
  const [timerActive,setTimerActive]=useState(false), [timerVal,setTimerVal]=useState(20);
  const timerRef=useRef(null);

  const curSubId=examMode?subjectList[Math.floor(asked/4)%subjectList.length]:subjectId;
  const curSub=getSub(curSubId);
  const scenario=curSub.scenarios[sceneIdx%curSub.scenarios.length];

  const load=useCallback(async()=>{
    setLoading(true);setError(null);setSelected(null);setOpenAns("");
    setRevealed(false);setFeedback(null);setMascotState("thinking");
    setShowHint(false);setHintUsed(false);
    clearInterval(timerRef.current);setTimerActive(false);setTimerVal(20);
    try{
      const sid=examMode?subjectList[Math.floor(asked/4)%subjectList.length]:subjectId;
      const qq=await generateQuestion(sid,profile.level,prevTopics,forceTopic,examMode);
      setQ(qq);setMascotState("talk");
      if(autoRead||voiceEnabled)setTimeout(()=>speak(qq.question,voiceLang(examMode?subjectList[Math.floor(asked/4)%subjectList.length]:subjectId)),300);
      // Activer timer pour QCM uniquement
      if(qq.type==="qcm"){
        setTimerActive(true);setTimerVal(20);
        timerRef.current=setInterval(()=>{
          setTimerVal(v=>{
            if(v<=1){clearInterval(timerRef.current);setTimerActive(false);if(!revealed)commit(false,qq);return 0;}
            return v-1;
          });
        },1000);
      }
      setTimeout(()=>setMascotState("idle"),1500);
    }catch{setError("Connexion impossible.");setMascotState("idle");}
    setLoading(false);
  },[subjectId,profile.level,prevTopics,forceTopic,asked]);

  useEffect(()=>{load();},[]);
  useEffect(()=>()=>clearInterval(timerRef.current),[]);

  const commit=(isCorrect,qOverride=null)=>{
    clearInterval(timerRef.current);setTimerActive(false);
    const qq=qOverride||q;
    const ns=isCorrect?streak+1:0;
    setStreak(ns);
    const badge=STREAK_BADGES.slice().reverse().find(b=>b.streak===ns);
    if(badge){setBadgePopup(badge);setTimeout(()=>setBadgePopup(null),2500);}
    setFeedback(isCorrect?"correct":"wrong");
    setRevealed(true);
    setMascotState(isCorrect?"correct":"wrong");
    setParticles(isCorrect?"win":"lose");
    setTimeout(()=>setParticles(null),1200);
    if(isCorrect)setScore(s=>s+1);
    if(qq&&qq.topic)setPrevTopics(p=>[...p,qq.topic]);
    onEarnStars(isCorrect?5*MULT:0,isCorrect,1,qq?.topic,ns);
    setTimeout(()=>setMascotState("idle"),1000);
  };

  const handleQCM=(letter)=>{if(!revealed){setSelected(letter);commit(letter===q.answer);}};
  const handleOpen=()=>{
    if(!openAns.trim()||revealed)return;
    const u=openAns.trim().toLowerCase(),a=q.answer.toLowerCase();
    commit(u===a||u.includes(a)||a.includes(u));
  };
  const handleNext=()=>{
    if(asked+1>=SESSION)onBack(score,SESSION,streak);
    else{setAsked(n=>n+1);setSceneIdx(i=>i+1);load();}
  };
  const handleHint=()=>{setShowHint(true);setHintUsed(true);};

  const choiceColors=["#4ECDC4","#FF6B9D","#A855F7","#F59E0B"];

  return(
    <div style={{minHeight:"100vh",background:scenario.bg,fontFamily:"'Nunito','Segoe UI',sans-serif",display:"flex",flexDirection:"column",position:"relative"}}>
      {/* Décor animé */}
      {!loading&&<SceneDecor subject={curSubId} sceneIdx={sceneIdx} frame={0}/>}

      {/* Particules */}
      {particles&&<Particles type={particles}/>}

      {/* Header */}
      <div style={{padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(0,0,0,0.4)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,0.1)",position:"relative",zIndex:10}}>
        <button onClick={()=>onBack(score,asked,streak)} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:10,padding:"8px 12px",color:"#fff",fontSize:16,cursor:"pointer"}}>← Quitter</button>
        <div style={{textAlign:"center"}}>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:10,textTransform:"uppercase",letterSpacing:1}}>{scenario.scene}</div>
          <div style={{color:"#fff",fontWeight:800,fontSize:13}}>{examMode?"📋 Examen":curSub.label}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {q?.type==="qcm"&&timerActive&&<TimerRing seconds={timerVal} max={20} color={curSub.color}/>}
          <div style={{textAlign:"right"}}>
            <div style={{color:"#FFD700",fontWeight:800,fontSize:16}}>{score*5*MULT}⭐</div>
            <div style={{color:"rgba(255,255,255,0.4)",fontSize:11}}>{asked+1}/{SESSION}</div>
          </div>
        </div>
      </div>
      <div style={{padding:"4px 16px",position:"relative",zIndex:10}}>
        <ProgressBar value={asked+(revealed?1:0)} max={SESSION} color={curSub.color} height={6}/>
      </div>

      {/* Contenu principal */}
      <div style={{flex:1,padding:"12px 14px 20px",overflowY:"auto",position:"relative",zIndex:5}}>
        {loading&&(
          <div style={{textAlign:"center",paddingTop:60}}>
            <div style={{fontSize:50,display:"inline-block",animation:"mascotThink 1.5s ease-in-out infinite"}}>{curSub.mascot}</div>
            <p style={{color:"rgba(255,255,255,0.6)",marginTop:12,fontWeight:700}}>En train de réfléchir...</p>
            <style>{`@keyframes mascotThink2{0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(5deg) translateY(-5px)}}`}</style>
          </div>
        )}
        {error&&<div style={{textAlign:"center",paddingTop:40}}>
          <div style={{fontSize:40}}>📡</div>
          <p style={{color:"rgba(255,255,255,0.75)",marginTop:12}}>{error}</p>
          <button onClick={load} style={{marginTop:16,padding:"12px 24px",borderRadius:12,background:curSub.color,border:"none",color:"#fff",fontWeight:700,cursor:"pointer"}}>Réessayer</button>
        </div>}

        {!loading&&!error&&q&&(
          <>
            {/* Mascotte + bulle de dialogue */}
            <div style={{display:"flex",alignItems:"flex-end",gap:12,marginBottom:16}}>
              <Mascot emoji={curSub.mascot} state={mascotState} size={52}/>
              <div style={{display:"flex",flexDirection:"column",gap:6,flex:1}}>
                {q.context&&<div style={{display:"inline-block",background:`${curSub.color}33`,border:`1px solid ${curSub.color}66`,borderRadius:99,padding:"3px 10px",color:curSub.color,fontSize:11,fontWeight:700,alignSelf:"flex-start"}}>{q.context}</div>}
                <SpeechBubble text={`${curSub.mascotName} : ${scenario.intro}`} color={curSub.color}/>
              </div>
            </div>

            {/* Carte question */}
            <div style={{background:"rgba(0,0,0,0.5)",backdropFilter:"blur(16px)",borderRadius:20,padding:"18px 16px",border:`1px solid ${curSub.color}44`,marginBottom:16,boxShadow:`0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.1)`}}>
              {q.topic&&<div style={{display:"inline-block",padding:"3px 10px",background:`${curSub.color}33`,border:`1px solid ${curSub.color}55`,borderRadius:99,color:curSub.color,fontSize:10,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>{q.topic}</div>}
              <p style={{color:"#fff",fontSize:17,fontWeight:700,margin:0,lineHeight:1.55}}>{q.question}</p>
              {/* Indice */}
              {!revealed&&q.hint&&(
                <div style={{marginTop:10}}>
                  {!showHint?(
                    <button onClick={handleHint} style={{background:"rgba(255,255,255,0.08)",border:"1px dashed rgba(255,255,255,0.25)",borderRadius:10,padding:"6px 12px",color:"rgba(255,255,255,0.55)",fontSize:12,cursor:"pointer",fontWeight:600}}>
                      💡 Voir un indice {hintUsed?"(déjà utilisé)":""}
                    </button>
                  ):(
                    <div style={{marginTop:6,padding:"8px 12px",background:"rgba(255,215,0,0.12)",border:"1px solid rgba(255,215,0,0.3)",borderRadius:10,animation:"bubbleIn 0.3s ease both"}}>
                      <span style={{color:"#FFD700",fontSize:12,fontWeight:600}}>💡 {q.hint}</span>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Boutons vocaux */}
            {voiceEnabled&&q&&<VoiceButtons text={q.question} lang={voiceLang(curSubId)} subjectId={curSubId} question={q} speechSupported={speechSupported} onSpeech={(transcript)=>{if(q.type==="open"&&!revealed){setOpenAns(transcript);}}}/>}

            {/* Choix QCM */}
            {q.type==="qcm"&&(
              <div style={{display:"flex",flexDirection:"column",gap:9}}>
                {(q.choices||[]).map((choice,i)=>{
                  const letter=["A","B","C","D"][i];
                  const isC=letter===q.answer, isSel=selected===letter;
                  let bg="rgba(255,255,255,0.07)",border="rgba(255,255,255,0.15)",icon="";
                  if(revealed){
                    if(isC){bg=`rgba(74,222,128,0.22)`;border="#4ade80";icon="✓";}
                    else if(isSel){bg="rgba(248,113,113,0.22)";border="#f87171";icon="✗";}
                  } else if(isSel){bg=`${choiceColors[i]}33`;border=choiceColors[i];}
                  return <button key={i} onClick={()=>handleQCM(letter)} disabled={revealed}
                    style={{padding:"13px 14px",borderRadius:14,border:`2px solid ${border}`,background:bg,color:"#fff",cursor:revealed?"default":"pointer",display:"flex",alignItems:"center",gap:11,fontSize:14,fontWeight:600,textAlign:"left",transition:"all 0.15s",transform:isSel&&!revealed?"scale(0.99)":"scale(1)"}}>
                    <span style={{width:30,height:30,borderRadius:"50%",background:`${choiceColors[i]}44`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,flexShrink:0,color:choiceColors[i]}}>{letter}</span>
                    <span style={{flex:1}}>{choice.replace(/^[ABCD]\)\s*/,"")}</span>
                    {icon&&<span style={{fontSize:20,animation:icon==="✓"?"popIn 0.3s cubic-bezier(0.34,1.56,0.64,1)":"shake 0.3s ease"}}>{icon}</span>}
                  </button>;
                })}
              </div>
            )}

            {/* Question ouverte */}
            {q.type==="open"&&<div>
              <input value={openAns} onChange={e=>setOpenAns(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleOpen()} disabled={revealed}
                placeholder="Ta réponse..."
                style={{width:"100%",padding:"14px 16px",borderRadius:14,border:`2px solid ${revealed?(feedback==="correct"?"#4ade80":"#f87171"):"rgba(255,255,255,0.25)"}`,background:"rgba(0,0,0,0.4)",backdropFilter:"blur(8px)",color:"#fff",fontSize:16,fontWeight:700,outline:"none",boxSizing:"border-box",marginBottom:10}}/>
              {!revealed&&<button onClick={handleOpen} disabled={!openAns.trim()} style={{width:"100%",padding:14,borderRadius:14,background:openAns.trim()?`linear-gradient(135deg,${curSub.color},${curSub.color}88)`:"rgba(255,255,255,0.1)",border:"none",color:"#fff",fontWeight:800,fontSize:15,cursor:openAns.trim()?"pointer":"not-allowed",boxShadow:openAns.trim()?`0 4px 20px ${curSub.color}44`:"none"}}>
                Valider ✓
              </button>}
            </div>}

            {/* Feedback */}
            {revealed&&(
              <div style={{marginTop:14,padding:"14px 16px",borderRadius:18,background:feedback==="correct"?"rgba(0,0,0,0.5)":"rgba(0,0,0,0.5)",backdropFilter:"blur(12px)",border:`2px solid ${feedback==="correct"?"#4ade80":"#f87171"}`,boxShadow:`0 8px 32px ${feedback==="correct"?"rgba(74,222,128,0.2)":"rgba(248,113,113,0.2)"}`,animation:"popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:8}}>
                  <Mascot emoji={curSub.mascot} state={feedback} size={36}/>
                  <SpeechBubble text={feedback==="correct"?`Excellent ! +${5*MULT}⭐${weekend?" (×2 week-end !)":""}${streak>=3?` Série de ${streak} 🔥`:""}`:q.explanation||"Pas tout à fait, mais tu vas y arriver !"} color={curSub.color} animate={true}/>
                </div>
                {feedback==="wrong"&&<div style={{padding:"8px 12px",background:"rgba(255,255,255,0.07)",borderRadius:10,marginBottom:10}}>
                  <span style={{color:"rgba(255,255,255,0.7)",fontSize:13}}>✅ La bonne réponse : <strong style={{color:"#4ade80"}}>{q.answer}</strong></span>
                </div>}
                <button onClick={handleNext} style={{width:"100%",padding:13,borderRadius:12,border:"none",background:"linear-gradient(135deg,#FFD700,#FF8C00)",color:"#1a1a1a",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 4px 16px rgba(255,215,0,0.4)",animation:"popIn 0.4s 0.2s cubic-bezier(0.34,1.56,0.64,1) both"}}>
                  {asked+1>=SESSION?(examMode?"Voir mon bulletin 📋":"Voir le résultat 🏁"):"Question suivante →"}
                </button>
              </div>
            )}
          </>
        )}
      </div>

      {/* Badge popup */}
      {badgePopup&&(
        <div style={{position:"fixed",top:"30%",left:"50%",transform:"translate(-50%,-50%)",background:"rgba(10,10,20,0.96)",backdropFilter:"blur(16px)",borderRadius:28,padding:"28px 36px",textAlign:"center",zIndex:9999,border:"2px solid #FFD700",boxShadow:"0 0 60px rgba(255,215,0,0.5)",animation:"popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)"}}>
          <div style={{fontSize:64}}>{badgePopup.emoji}</div>
          <div style={{color:"#FFD700",fontWeight:900,fontSize:22,marginTop:10}}>{badgePopup.label}</div>
          <div style={{color:"rgba(255,255,255,0.55)",fontSize:13,marginTop:5}}>Badge débloqué !</div>
        </div>
      )}
      <style>{`@keyframes popIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}100%{transform:translateX(0)}}`}</style>
    </div>
  );
}

// ─── RÉSULTAT ─────────────────────────────────────────────────────────────────────
function ResultScreen({score,total,starsEarned,theme,weekend,examMode,onHome}){
  const t=THEMES[theme];
  const pct=Math.round((score/total)*100);
  const mention=examMode?(pct>=90?"Très Bien 🏆":pct>=75?"Bien 🥇":pct>=60?"Assez Bien 🥈":pct>=50?"Passable 🥉":"À travailler 💪"):null;
  const msg=pct>=80?"Excellent ! 🔥":pct>=60?"Bien joué ! 💪":pct>=40?"Continue ! 📈":"Réessaie ! 🎮";
  return(
    <div style={{minHeight:"100vh",background:t.bg,fontFamily:"'Nunito','Segoe UI',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center"}}>
      <div style={{fontSize:64,marginBottom:10,animation:"mascotCorrect 0.8s cubic-bezier(0.34,1.56,0.64,1)"}}>{pct>=80?"🏆":pct>=60?"🥈":pct>=40?"🥉":"💫"}</div>
      {examMode&&<div style={{fontSize:12,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:2,marginBottom:8}}>Bulletin d'examen</div>}
      <h2 style={{color:"#fff",fontSize:26,fontWeight:900,margin:"0 0 6px"}}>{examMode?mention:msg}</h2>
      {!examMode&&<div style={{fontSize:48,fontWeight:900,color:t.accent,margin:"6px 0"}}>{score}/{total}</div>}
      {examMode&&<div style={{background:"rgba(255,255,255,0.1)",borderRadius:20,padding:"20px 28px",margin:"12px 0",width:"100%",maxWidth:300}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{color:"rgba(255,255,255,0.6)"}}>Score</span><span style={{color:"#fff",fontWeight:800}}>{score}/{total}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{color:"rgba(255,255,255,0.6)"}}>Résultat</span><span style={{color:t.accent,fontWeight:800}}>{pct}%</span></div>
        <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"rgba(255,255,255,0.6)"}}>Mention</span><span style={{color:"#FFD700",fontWeight:800}}>{mention}</span></div>
      </div>}
      {!examMode&&<p style={{color:"rgba(255,255,255,0.55)",fontSize:15}}>{pct}% de réussite</p>}
      <div style={{margin:"12px 0 22px",padding:"13px 26px",borderRadius:18,background:"rgba(255,215,0,0.14)",border:"1px solid rgba(255,215,0,0.38)"}}>
        <span style={{fontSize:26,fontWeight:900,color:"#FFD700"}}>+{starsEarned} ⭐</span>
        {weekend&&<div style={{color:"#FFD700",fontSize:12,marginTop:3}}>🔥 Bonus week-end inclus !</div>}
      </div>
      <button onClick={onHome} style={{padding:"14px 38px",borderRadius:15,background:"linear-gradient(135deg,#FFD700,#FF8C00)",border:"none",color:"#1a1a1a",fontWeight:800,fontSize:15,cursor:"pointer"}}>Retour à l'accueil</button>
      <style>{`@keyframes mascotCorrect{0%{transform:scale(1)}30%{transform:scale(1.3) rotate(15deg)}60%{transform:scale(0.9)}100%{transform:scale(1)}}`}</style>
    </div>
  );
}

// ─── SHOP ─────────────────────────────────────────────────────────────────────────
function ShopScreen({profile,onBack,onBuy}){
  const theme=THEMES[profile.theme];
  const items=profile.theme==="foot"?FOOT_SHOP:CITY_SHOP;
  const types=[...new Set(items.map(i=>i.type))];
  const [activeType,setActiveType]=useState("view");
  const [toast,setToast]=useState(null);
  const typeLabels={stade:"🏟️ Stade",joueur:"⚽ Joueurs",equip:"👕 Équipement",trophee:"🏆 Trophées",nature:"🌳 Nature",batiment:"🏗️ Bâtiments",commerce:"🛒 Commerces",special:"✨ Spécial",habitant:"👥 Habitants"};
  const handleBuy=(item)=>{
    if(profile.owned.includes(item.id))return;
    if(profile.stars<item.cost){setToast("Pas assez d'étoiles !");setTimeout(()=>setToast(null),2000);return;}
    onBuy(item);setToast(`${item.emoji} Débloqué !`);setTimeout(()=>setToast(null),1500);
  };
  return(
    <div style={{minHeight:"100vh",background:theme.bg,fontFamily:"'Nunito','Segoe UI',sans-serif",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(0,0,0,0.3)",backdropFilter:"blur(10px)",borderBottom:`1px solid ${theme.border}33`}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#fff",fontSize:24,cursor:"pointer"}}>←</button>
        <div style={{textAlign:"center"}}><div style={{fontSize:20}}>{theme.emoji}</div><div style={{color:"#fff",fontWeight:800,fontSize:14}}>{theme.name}</div></div>
        <div style={{textAlign:"right"}}><div style={{color:"#FFD700",fontWeight:800,fontSize:18}}>{profile.stars}⭐</div></div>
      </div>
      <div style={{padding:"10px 14px 0",overflowX:"auto"}}>
        <div style={{display:"flex",gap:8,paddingBottom:2}}>
          <button onClick={()=>setActiveType("view")} style={{padding:"7px 14px",borderRadius:99,border:`1px solid ${activeType==="view"?theme.accent:"rgba(255,255,255,0.17)"}`,background:activeType==="view"?`${theme.accent}33`:"rgba(255,255,255,0.07)",color:"#fff",cursor:"pointer",whiteSpace:"nowrap",fontSize:12,fontWeight:700}}>
            {profile.theme==="foot"?"🏟️ Mon Stade":"🏙️ Ma Ville"}
          </button>
          {types.map(t=>(
            <button key={t} onClick={()=>setActiveType(t)} style={{padding:"7px 14px",borderRadius:99,border:`1px solid ${activeType===t?theme.accent:"rgba(255,255,255,0.17)"}`,background:activeType===t?`${theme.accent}33`:"rgba(255,255,255,0.07)",color:"#fff",cursor:"pointer",whiteSpace:"nowrap",fontSize:12,fontWeight:700}}>
              {typeLabels[t]||t}
            </button>
          ))}
        </div>
      </div>
      <div style={{flex:1,padding:"12px 14px",overflowY:"auto"}}>
        {activeType==="view"&&(<>
          {profile.theme==="foot"?<StadeView owned={profile.owned}/>:<VilleView owned={profile.owned}/>}
          <div style={{marginTop:12,padding:"12px 14px",borderRadius:14,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)"}}>
            <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,marginBottom:6}}>Collection ({profile.owned.length}/{items.length})</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {profile.owned.map(id=>{const it=items.find(i=>i.id===id);return it?<span key={id} title={it.name} style={{fontSize:22}}>{it.emoji}</span>:null;})}
              {profile.owned.length===0&&<span style={{color:"rgba(255,255,255,0.3)",fontSize:13}}>Gagne des ⭐ pour débloquer !</span>}
            </div>
          </div>
        </>)}
        {activeType!=="view"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {items.filter(i=>i.type===activeType).map(item=>{
              const owned=profile.owned.includes(item.id),can=profile.stars>=item.cost;
              return <div key={item.id} style={{background:owned?`${theme.accent}22`:"rgba(255,255,255,0.07)",borderRadius:15,padding:"14px 12px",border:`1px solid ${owned?theme.accent:"rgba(255,255,255,0.1)"}`,display:"flex",flexDirection:"column",gap:5,opacity:!owned&&!can?0.55:1}}>
                <span style={{fontSize:32}}>{item.emoji}</span>
                <span style={{color:"#fff",fontWeight:800,fontSize:13,lineHeight:1.3}}>{item.name}</span>
                <span style={{color:"rgba(255,255,255,0.45)",fontSize:11}}>{item.desc}</span>
                {owned?<span style={{color:theme.accent,fontSize:12,fontWeight:700}}>✓ Débloqué</span>:(
                  <button onClick={()=>handleBuy(item)} style={{marginTop:3,padding:"7px 0",borderRadius:9,background:can?"linear-gradient(135deg,#FFD700,#FF8C00)":"rgba(255,255,255,0.1)",border:"none",color:can?"#1a1a1a":"rgba(255,255,255,0.33)",fontWeight:800,fontSize:12,cursor:can?"pointer":"not-allowed"}}>
                    {item.cost} ⭐
                  </button>
                )}
              </div>;
            })}
          </div>
        )}
      </div>
      {toast&&<Toast msg={toast} accent={theme.accent}/>}
    </div>
  );
}

// ─── LEADERBOARD ──────────────────────────────────────────────────────────────────
function LeaderboardScreen({profile,onBack}){
  const theme=THEMES[profile.theme];
  const weekId=getWeekId();
  const [entries,setEntries]=useState([]);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  useEffect(()=>{
    (async()=>{
      const myStars=(profile.weeklyStars||{})[weekId]||0;
      await sharedSet(`board:${profile.pseudo}`,{pseudo:profile.pseudo,stars:myStars,weekId,ts:Date.now()});
      const keys=await sharedList("board:");
      const all=await Promise.all(keys.map(async k=>{try{const r=await window.storage.get(k,true);return r?JSON.parse(r.value):null;}catch{return null;}}));
      setEntries(all.filter(e=>e&&e.weekId===weekId).sort((a,b)=>b.stars-a.stars));
      setLoading(false);
    })();
  },[]);
  const sendChallenge=async(opponent,subject)=>{
    const id=`${Date.now()}-${Math.random().toString(36).slice(2)}`;
    await sharedSet(`challenge:${id}`,{id,from:profile.pseudo,to:opponent,subject,accepted:false,ts:Date.now()});
    setToast(`Défi envoyé à ${opponent} ! 🥊`);setTimeout(()=>setToast(null),2500);
  };
  const medals=["🥇","🥈","🥉"];
  const myWeekStars=(profile.weeklyStars||{})[weekId]||0;
  return(
    <div style={{minHeight:"100vh",background:theme.bg,fontFamily:"'Nunito','Segoe UI',sans-serif",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(0,0,0,0.3)",backdropFilter:"blur(10px)",borderBottom:`1px solid ${theme.border}33`}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#fff",fontSize:24,cursor:"pointer"}}>←</button>
        <div style={{textAlign:"center"}}><div style={{fontSize:20}}>🏆</div><div style={{color:"#fff",fontWeight:800,fontSize:14}}>Classement semaine</div></div>
        <div style={{width:40}}/>
      </div>
      <div style={{flex:1,padding:"18px 14px"}}>
        <div style={{background:`${theme.accent}22`,borderRadius:15,padding:"14px 16px",border:`1px solid ${theme.accent}55`,marginBottom:18,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{color:"rgba(255,255,255,0.5)",fontSize:12}}>Cette semaine</div>
            <div style={{color:"#fff",fontWeight:900,fontSize:20}}>{profile.pseudo}</div>
            {profile.maxStreak>0&&<div style={{color:"#fb923c",fontSize:12,marginTop:2}}>🔥 Meilleure série : ×{profile.maxStreak}</div>}
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:"#FFD700",fontWeight:900,fontSize:28}}>{myWeekStars}</div>
            <div style={{color:"rgba(255,255,255,0.4)",fontSize:11}}>⭐ cette semaine</div>
          </div>
        </div>
        {loading?<div style={{textAlign:"center",paddingTop:30,color:"rgba(255,255,255,0.5)"}}>
          <div style={{fontSize:30,display:"inline-block",animation:"spin 1s linear infinite"}}>⏳</div>
          <style>{`@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}`}</style>
        </div>:entries.length===0?(
          <div style={{textAlign:"center",padding:"30px 20px"}}>
            <div style={{fontSize:44}}>👥</div>
            <p style={{color:"rgba(255,255,255,0.5)",fontSize:14,marginTop:12}}>Personne encore.<br/>Lance des révisions !</p>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.38)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4}}>{entries.length} joueur{entries.length>1?"s":""}</div>
            {entries.map((e,i)=>{
              const isMe=e.pseudo===profile.pseudo;
              return <div key={e.pseudo} style={{padding:"13px 14px",borderRadius:13,background:isMe?`${theme.accent}22`:"rgba(255,255,255,0.07)",border:`1px solid ${isMe?theme.accent:"rgba(255,255,255,0.11)"}`,display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:22,width:30,textAlign:"center"}}>{medals[i]||`${i+1}`}</span>
                <div style={{flex:1}}><div style={{color:"#fff",fontWeight:700,fontSize:14}}>{e.pseudo}{isMe?" (toi)":""}</div></div>
                <div style={{color:"#FFD700",fontWeight:800,fontSize:17,marginRight:isMe?0:8}}>{e.stars} ⭐</div>
                {!isMe&&(
                  <div style={{display:"flex",gap:5}}>
                    {SUBJECTS.slice(0,3).map(s=>(

const MINIGAMES_DEF = [
  { id:"penalty",  threshold:10,  recharge:10, label:"Penalty !",        emoji:"🥅", color:"#4ade80", desc:"Tire au but, marque un max !" },
  { id:"wordsnap",  threshold:20, recharge:10, label:"Mot Caché",        emoji:"🔤", color:"#FF6B9D", desc:"Trouve le mot mystère en 30s !" },
  { id:"flashquiz", threshold:30, recharge:10, label:"Quiz Flash",       emoji:"⚡", color:"#F59E0B", desc:"5 questions ultra-rapides !" },
  { id:"wheel",     threshold:40, recharge:10, label:"Roue Bonus",       emoji:"🎡", color:"#A855F7", desc:"Fais tourner la roue !" },
  { id:"memory",    threshold:50, recharge:10, label:"Mémoire",           emoji:"🧠", color:"#4ECDC4", desc:"Retrouve toutes les paires !" },
];

// Retourne les mini-jeux disponibles pour ce profil
function getAvailableMinigames(profile) {
  const total = profile.stats.total || 0;
  const played = profile.playedMinigames || {}; // { id: lastPlayedAtTotal }
  return MINIGAMES_DEF.filter(mg => {
    if (total < mg.threshold) return false; // pas encore débloqué
    const lastAt = played[mg.id];
    if (lastAt === undefined) return true;   // jamais joué
    return (total - lastAt) >= mg.recharge;  // rechargé
  });
}

// Prochain mini-jeu à débloquer
function getNextUnlock(profile) {
  const total = profile.stats.total || 0;
  return MINIGAMES_DEF.find(mg => total < mg.threshold);
}

// ─── MINI-JEU : PENALTY ──────────────────────────────────────────────────────────
function MinigamePenalty({ profile, onEnd }) {
  const theme = THEMES[profile.theme];
  const SHOTS = 5;
  const [phase, setPhase] = useState("intro"); // intro|aim|result|end
  const [shot, setShot] = useState(0);
  const [score, setScore] = useState(0);
  const [aimX, setAimX] = useState(50);
  const [aimY, setAimY] = useState(50);
  const [gkPos, setGkPos] = useState(50);
  const [shotResult, setShotResult] = useState(null); // "goal"|"saved"
  const [history, setHistory] = useState([]);
  const [ballAnim, setBallAnim] = useState(false);
  const intervalRef = useRef(null);

  // Gardien qui bouge en phase aim
  useEffect(() => {
    if (phase !== "aim") return;
    intervalRef.current = setInterval(() => {
      setGkPos(p => {
        const d = (Math.random() - 0.5) * 30;
        return Math.max(15, Math.min(85, p + d));
      });
    }, 600);
    return () => clearInterval(intervalRef.current);
  }, [phase, shot]);

  const handleAim = (e) => {
    if (phase !== "aim") return;
    const rect = e.currentTarget.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    setAimX(x); setAimY(y);
  };

  const shoot = () => {
    if (phase !== "aim") return;
    clearInterval(intervalRef.current);
    setBallAnim(true);
    // Gardien saute vers un côté aléatoire
    const gkJump = Math.random() < 0.5 ? 20 : 80;
    setGkPos(gkJump);
    // But si gardien pas au bon endroit
    const isGoal = Math.abs(aimX - gkJump) > 18 && aimY < 80;
    setTimeout(() => {
      setShotResult(isGoal ? "goal" : "saved");
      if (isGoal) setScore(s => s + 1);
      setHistory(h => [...h, isGoal ? "⚽" : "🧤"]);
      setBallAnim(false);
      setPhase("result");
    }, 700);
  };

  const nextShot = () => {
    if (shot + 1 >= SHOTS) {
      setPhase("end");
    } else {
      setShot(s => s + 1);
      setAimX(50); setAimY(50); setGkPos(50);
      setShotResult(null);
      setPhase("aim");
    }
  };

  const bonus = score * 8; // 8 étoiles par but

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0f4c2a,#1a7a45,#0d3d22)", fontFamily:"'Nunito','Segoe UI',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", padding:"20px 16px" }}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <div style={{ color:"#fff", fontWeight:900, fontSize:22 }}>🥅 Penalty</div>
          <div style={{ color:"#FFD700", fontWeight:800, fontSize:18 }}>{score}/{SHOTS} ⚽</div>
        </div>

        {phase === "intro" && (
          <div style={{ textAlign:"center", paddingTop:40 }}>
            <div style={{ fontSize:80, animation:"bounce2 0.8s ease-in-out infinite" }}>⚽</div>
            <h2 style={{ color:"#fff", fontSize:24, fontWeight:900, marginTop:16 }}>Tirs au but !</h2>
            <p style={{ color:"rgba(255,255,255,0.7)", fontSize:15 }}>Appuie là où tu veux tirer, puis shoote ! Le gardien va sauter...</p>
            <p style={{ color:"#4ade80", fontWeight:700, fontSize:14, marginTop:8 }}>+8⭐ par but marqué</p>
            <button onClick={() => setPhase("aim")} style={{ marginTop:24, padding:"15px 40px", borderRadius:16, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:16, cursor:"pointer" }}>
              C'est parti ! ⚽
            </button>
            <style>{`@keyframes bounce2{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}`}</style>
          </div>
        )}

        {(phase === "aim" || phase === "result") && (
          <>
            {/* Historique des tirs */}
            <div style={{ display:"flex", gap:8, justifyContent:"center", marginBottom:16 }}>
              {history.map((r,i) => <span key={i} style={{ fontSize:24 }}>{r}</span>)}
              {Array.from({ length: SHOTS - history.length }).map((_,i) => <span key={i} style={{ fontSize:24, opacity:0.3 }}>⚪</span>)}
            </div>

            {/* Terrain */}
            <div
              onClick={handleAim}
              style={{ width:"100%", aspectRatio:"16/9", background:"linear-gradient(180deg,#166534,#15803d)", borderRadius:16, position:"relative", overflow:"hidden", cursor:phase==="aim"?"crosshair":"default", border:"2px solid rgba(255,255,255,0.15)", userSelect:"none" }}
            >
              {/* Lignes terrain */}
              <div style={{ position:"absolute", bottom:0, left:"10%", right:"10%", height:"55%", border:"2px solid rgba(255,255,255,0.3)", borderBottom:"none", borderRadius:"4px 4px 0 0" }} />
              <div style={{ position:"absolute", bottom:0, left:"30%", right:"30%", height:"28%", border:"2px solid rgba(255,255,255,0.3)", borderBottom:"none" }} />
              {/* But */}
              <div style={{ position:"absolute", top:0, left:"20%", right:"20%", height:"28%", background:"rgba(255,255,255,0.08)", border:"2px solid rgba(255,255,255,0.5)", borderTop:"none", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <div style={{ position:"absolute", left:0, top:0, bottom:0, width:4, background:"rgba(255,255,255,0.4)", borderRadius:2 }} />
                <div style={{ position:"absolute", right:0, top:0, bottom:0, width:4, background:"rgba(255,255,255,0.4)", borderRadius:2 }} />
              </div>
              {/* Gardien */}
              <div style={{ position:"absolute", top:"8%", left:`${gkPos}%`, transform:"translateX(-50%)", fontSize:32, transition:"left 0.3s ease", filter:"drop-shadow(0 2px 4px rgba(0,0,0,0.5))" }}>🧤</div>
              {/* Viseur */}
              {phase === "aim" && (
                <div style={{ position:"absolute", left:`${aimX}%`, top:`${aimY}%`, transform:"translate(-50%,-50%)", pointerEvents:"none" }}>
                  <div style={{ width:30, height:30, border:"2px solid #FFD700", borderRadius:"50%", boxShadow:"0 0 10px #FFD700" }} />
                  <div style={{ position:"absolute", top:"50%", left:-8, width:6, height:1, background:"#FFD700" }} />
                  <div style={{ position:"absolute", top:"50%", right:-8, width:6, height:1, background:"#FFD700" }} />
                  <div style={{ position:"absolute", left:"50%", top:-8, width:1, height:6, background:"#FFD700" }} />
                  <div style={{ position:"absolute", left:"50%", bottom:-8, width:1, height:6, background:"#FFD700" }} />
                </div>
              )}
              {/* Ballon animé */}
              <div style={{ position:"absolute", bottom:"40%", left:"50%", transform:"translateX(-50%)", fontSize:28,
                animation: ballAnim ? `ballShoot 0.7s ease forwards` : "none" }}>
                ⚽
                <style>{`@keyframes ballShoot{0%{transform:translateX(-50%) scale(1)}100%{transform:translateX(${aimX-50}px) translateY(-80px) scale(0.4)}}`}</style>
              </div>
              {/* Résultat */}
              {phase === "result" && (
                <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", background:"rgba(0,0,0,0.5)", borderRadius:14 }}>
                  <div style={{ textAlign:"center", animation:"popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)" }}>
                    <div style={{ fontSize:52 }}>{shotResult === "goal" ? "⚽" : "🧤"}</div>
                    <div style={{ color: shotResult === "goal" ? "#4ade80" : "#f87171", fontWeight:900, fontSize:22, marginTop:4 }}>
                      {shotResult === "goal" ? "BUT ! +8⭐" : "Arrêté !"}
                    </div>
                  </div>
                </div>
              )}
            </div>

            {phase === "aim" && (
              <div style={{ marginTop:16, textAlign:"center" }}>
                <p style={{ color:"rgba(255,255,255,0.6)", fontSize:13, marginBottom:12 }}>Appuie sur le terrain pour viser, puis :</p>
                <button onClick={shoot} style={{ padding:"14px 48px", borderRadius:16, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:18, cursor:"pointer", boxShadow:"0 4px 20px rgba(255,215,0,0.4)" }}>

            </div>
            <br/>
            <button onClick={() => onEnd(bonus)} style={{ padding:"14px 40px", borderRadius:16, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:16, cursor:"pointer" }}>

  { word:"FRACTION", hint:"Numérateur sur dénominateur", category:"Maths" },

  { word:"OXYGENE",   hint:"Gaz que l'on respire", category:"Sciences" },
  { word:"PYRAMIDE",  hint:"Monument égyptien", category:"Histoire" },
  { word:"REPUBLIQUE",hint:"Forme de gouvernement française", category:"Histoire" },
  { word:"BUTTERFLY", hint:"Comment dit-on papillon en anglais ?", category:"Anglais" },
  { word:"SCHOOL",    hint:"Où on apprend... en anglais", category:"Anglais" },
];

function MinigameWordSnap({ profile, onEnd }) {
  const TIME = 45;
  const [phase, setPhase] = useState("intro");
  const [wordDef] = useState(() => WORD_LISTS[Math.floor(Math.random() * WORD_LISTS.length)]);
  const [revealed, setRevealed] = useState([]); // indices révélés
  const [guess, setGuess] = useState("");
  const [timeLeft, setTimeLeft] = useState(TIME);
  const [result, setResult] = useState(null); // "win"|"lose"
  const [attempts, setAttempts] = useState(0);
  const timerRef = useRef(null);

  const letters = wordDef.word.split("");
  // Masque initial : révèle 1ère et dernière lettre
  const initRevealed = [0, letters.length - 1];

  useEffect(() => {
    if (phase !== "play") return;
    setRevealed(initRevealed);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          setResult("lose");
          setPhase("end");
          return 0;
        }
        // Révèle une lettre de plus toutes les 10s
        if ((t - 1) % 10 === 0) {
          setRevealed(r => {
            const hidden = letters.map((_,i)=>i).filter(i=>!r.includes(i));
            if (hidden.length === 0) return r;
            return [...r, hidden[Math.floor(Math.random()*hidden.length)]];
          });
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [phase]);

  const handleGuess = () => {
    if (!guess.trim()) return;
    setAttempts(a => a + 1);
    if (guess.trim().toUpperCase() === wordDef.word.toUpperCase()) {
      clearInterval(timerRef.current);
      setResult("win");
      setPhase("end");
      setRevealed(letters.map((_,i)=>i));
    } else {
      setGuess("");
    }
  };

  const bonus = result === "win" ? Math.max(5, Math.floor(timeLeft / 3) * 3) : 0;
  const urgentColor = timeLeft <= 10 ? "#f87171" : "#4ade80";

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#450a0a,#7f1d1d,#1a0533)", fontFamily:"'Nunito','Segoe UI',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", padding:"20px 16px" }}>
      <div style={{ width:"100%", maxWidth:400 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <div style={{ color:"#fff", fontWeight:900, fontSize:22 }}>🔤 Mot Caché</div>
          {phase === "play" && <div style={{ color:urgentColor, fontWeight:800, fontSize:20 }}>{timeLeft}s</div>}
        </div>

        {phase === "intro" && (
          <div style={{ textAlign:"center", paddingTop:40 }}>
            <div style={{ fontSize:80 }}>🔤</div>
            <h2 style={{ color:"#fff", fontSize:22, fontWeight:900, marginTop:16 }}>Trouve le mot !</h2>
            <p style={{ color:"rgba(255,255,255,0.7)", fontSize:15 }}>Un indice, des lettres cachées. Des lettres se révèlent avec le temps.</p>
            <p style={{ color:"#FF6B9D", fontWeight:700, fontSize:14, marginTop:8 }}>Bonus : plus tu es rapide, plus tu gagnes ! ⭐</p>
            <button onClick={() => setPhase("play")} style={{ marginTop:24, padding:"15px 40px", borderRadius:16, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:16, cursor:"pointer" }}>
              Jouer !
            </button>
          </div>
        )}

        {phase === "play" && (
          <>
            {/* Timer bar */}
            <div style={{ height:8, background:"rgba(255,255,255,0.15)", borderRadius:99, marginBottom:20, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${(timeLeft/TIME)*100}%`, background:urgentColor, borderRadius:99, transition:"width 1s linear, background 0.3s" }} />
            </div>
            {/* Indice */}
            <div style={{ padding:"14px 16px", background:"rgba(255,255,255,0.1)", borderRadius:14, marginBottom:20, border:"1px solid rgba(255,255,255,0.2)" }}>
              <div style={{ color:"rgba(255,255,255,0.5)", fontSize:11, textTransform:"uppercase", letterSpacing:1, marginBottom:4 }}>Indice • {wordDef.category}</div>
              <div style={{ color:"#fff", fontWeight:700, fontSize:16 }}>💡 {wordDef.hint}</div>
            </div>
            {/* Lettres */}
            <div style={{ display:"flex", flexWrap:"wrap", gap:6, justifyContent:"center", marginBottom:24 }}>
              {letters.map((l, i) => (
                <div key={i} style={{ width:36, height:44, borderRadius:10, background:revealed.includes(i)?"rgba(255,107,157,0.3)":"rgba(255,255,255,0.1)", border:`2px solid ${revealed.includes(i)?"#FF6B9D":"rgba(255,255,255,0.2)"}`, display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:900, fontSize:18, transition:"all 0.3s" }}>
                  {revealed.includes(i) ? l : "?"}
                </div>
              ))}
            </div>
            {/* Input */}
            <div style={{ display:"flex", gap:8 }}>
              <input value={guess} onChange={e=>setGuess(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleGuess()}
                placeholder="Tape le mot..."
                style={{ flex:1, padding:"13px 16px", borderRadius:12, border:"2px solid rgba(255,255,255,0.3)", background:"rgba(255,255,255,0.1)", color:"#fff", fontSize:15, fontWeight:700, outline:"none" }}
              />
              <button onClick={handleGuess} style={{ padding:"13px 16px", borderRadius:12, background:"#FF6B9D", border:"none", color:"#fff", fontWeight:800, fontSize:15, cursor:"pointer" }}>OK</button>
            </div>
            {attempts > 0 && <p style={{ color:"#f87171", fontSize:12, marginTop:8, textAlign:"center" }}>❌ Pas tout à fait... ({attempts} essai{attempts>1?"s":""})</p>}
          </>
        )}

        {phase === "end" && (
          <div style={{ textAlign:"center", paddingTop:30 }}>
            <div style={{ fontSize:64 }}>{result === "win" ? "🎉" : "😅"}</div>
            <h2 style={{ color:"#fff", fontSize:24, fontWeight:900, marginTop:12 }}>
              {result === "win" ? "Trouvé !" : "Temps écoulé !"}
            </h2>
            <div style={{ fontSize:32, fontWeight:900, color:"#FF6B9D", letterSpacing:4, margin:"16px 0" }}>
              {wordDef.word.split("").map((l,i)=><span key={i} style={{animation:`revealLetter 0.3s ${i*0.08}s both`,display:"inline-block"}}>{l}</span>)}
            </div>
            <p style={{ color:"rgba(255,255,255,0.6)", fontSize:14 }}>💡 {wordDef.hint}</p>
            {result === "win" && <div style={{ padding:"14px 28px", background:"rgba(255,215,0,0.15)", border:"1px solid rgba(255,215,0,0.4)", borderRadius:18, display:"inline-block", margin:"16px 0" }}>
              <span style={{ color:"#FFD700", fontWeight:900, fontSize:26 }}>+{bonus} ⭐</span>
              <p style={{ color:"rgba(255,255,255,0.55)", fontSize:12, margin:"4px 0 0" }}>en {TIME - timeLeft}s • {attempts} essai{attempts>1?"s":""}</p>
            </div>}
            <br/>
            <button onClick={() => onEnd(bonus)} style={{ padding:"14px 40px", borderRadius:16, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:16, cursor:"pointer", marginTop:8 }}>
              Retour
            </button>
            <style>{`@keyframes revealLetter{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}`}</style>
          </div>
        )}
      </div>
    </div>
  );
}

function MinigameFlashQuiz({ profile, onEnd }) {
  const TOTAL = 5;
  const TIME_PER_Q = 4;
  const [phase, setPhase] = useState("intro");
  const [qIdx, setQIdx] = useState(0);
  const [questions] = useState(() => {
    const shuffled = [...FLASH_QUESTIONS].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, TOTAL);
  });
  const [score, setScore] = useState(0);
  const [timeLeft, setTimeLeft] = useState(TIME_PER_Q);
  const [answered, setAnswered] = useState(null);
  const [history, setHistory] = useState([]);
  const timerRef = useRef(null);

  const startTimer = () => {
    setTimeLeft(TIME_PER_Q);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          handleAnswer(null); // timeout
          return 0;
        }
        return t - 1;
      });
    }, 1000);
  };

  const handleAnswer = (choice) => {
    if (answered !== null) return;
    clearInterval(timerRef.current);
    const q = questions[qIdx];
    const correct = choice === q.a;
    setAnswered(choice);
    if (correct) setScore(s => s + 1);
    setHistory(h => [...h, correct ? "✅" : "❌"]);
    setTimeout(() => {
      setAnswered(null);
      if (qIdx + 1 >= TOTAL) { setPhase("end"); }
      else { setQIdx(i => i + 1); startTimer(); }
    }, 900);
  };

  const start = () => { setPhase("play"); startTimer(); };
  useEffect(() => () => clearInterval(timerRef.current), []);

  const bonus = score * 12;
  const q = questions[qIdx];

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1c0d00,#431407,#1a0a00)", fontFamily:"'Nunito','Segoe UI',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", padding:"20px 16px" }}>

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>

          {phase === "play" && <div style={{ color:"#F59E0B", fontWeight:800, fontSize:18 }}>{qIdx+1}/{TOTAL}</div>}
        </div>

        {phase === "intro" && (
          <div style={{ textAlign:"center", paddingTop:40 }}>
            <div style={{ fontSize:80, animation:"bounce2 0.6s ease-in-out infinite" }}>⚡</div>
            <h2 style={{ color:"#fff", fontSize:22, fontWeight:900, marginTop:16 }}>Quiz Ultra-Rapide !</h2>
            <p style={{ color:"rgba(255,255,255,0.7)", fontSize:15 }}>{TOTAL} questions · {TIME_PER_Q} secondes chacune · Que des réflexes !</p>
            <p style={{ color:"#F59E0B", fontWeight:700, fontSize:14, marginTop:8 }}>+12⭐ par bonne réponse</p>
            <button onClick={start} style={{ marginTop:24, padding:"15px 40px", borderRadius:16, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:16, cursor:"pointer" }}>
              GO ! ⚡
            </button>
          </div>
        )}

        {phase === "play" && (
          <>
            {/* Timer bar urgente */}
            <div style={{ height:10, background:"rgba(255,255,255,0.1)", borderRadius:99, marginBottom:20, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${(timeLeft/TIME_PER_Q)*100}%`, background: timeLeft<=2?"#f87171":"#F59E0B", borderRadius:99, transition:"width 1s linear" }} />
            </div>
            {/* Historique */}
            <div style={{ display:"flex", gap:6, justifyContent:"center", marginBottom:16 }}>
              {history.map((r,i)=><span key={i} style={{fontSize:20}}>{r}</span>)}
              {Array.from({length:TOTAL-history.length}).map((_,i)=><span key={i} style={{fontSize:20,opacity:0.25}}>⚪</span>)}
            </div>
            {/* Question */}
            <div style={{ background:"rgba(255,255,255,0.08)", backdropFilter:"blur(12px)", borderRadius:20, padding:"22px 18px", border:"1px solid rgba(245,158,11,0.4)", marginBottom:20, textAlign:"center" }}>
              <p style={{ color:"#fff", fontSize:20, fontWeight:900, margin:0 }}>{q.q}</p>
            </div>
            {/* Choix */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              {q.choices.map((c,i) => {
                const isCorrect = c === q.a;

                let bg = "rgba(255,255,255,0.08)", border = "rgba(255,255,255,0.2)";
                if (answered !== null) {

                return <button key={i} onClick={()=>handleAnswer(c)} disabled={answered!==null}

const WHEEL_SEGMENTS = [
  { label:"+10 ⭐",  value:10,  color:"#4ade80" },
  { label:"+25 ⭐",  value:25,  color:"#F59E0B" },
  { label:"+5 ⭐",   value:5,   color:"#4ECDC4" },
  { label:"+50 ⭐",  value:50,  color:"#f87171" },
  { label:"+15 ⭐",  value:15,  color:"#A855F7" },
  { label:"+30 ⭐",  value:30,  color:"#FF6B9D" },
  { label:"+8 ⭐",   value:8,   color:"#60a5fa" },
  { label:"JACKPOT 🌟",value:100,color:"#FFD700" },
];

function MinigameWheel({ profile, onEnd }) {
  const [phase, setPhase] = useState("ready"); // ready|spinning|result
  const [rotation, setRotation] = useState(0);
  const [winner, setWinner] = useState(null);
  const [spinsLeft, setSpinsLeft] = useState(2);
  const [totalBonus, setTotalBonus] = useState(0);

  const spin = () => {
    if (phase === "spinning" || spinsLeft <= 0) return;
    const extraSpins = 5 + Math.random() * 5; // 5-10 tours complets
    const segmentAngle = 360 / WHEEL_SEGMENTS.length;
    const targetSeg = Math.floor(Math.random() * WHEEL_SEGMENTS.length);
    const targetAngle = 360 * extraSpins + (360 - targetSeg * segmentAngle - segmentAngle / 2);
    const newRot = rotation + targetAngle;
    setRotation(newRot);
    setPhase("spinning");
    setTimeout(() => {
      setWinner(WHEEL_SEGMENTS[targetSeg]);
      setTotalBonus(b => b + WHEEL_SEGMENTS[targetSeg].value);
      setSpinsLeft(s => s - 1);
      setPhase("result");
    }, 3500);
  };

  const segAngle = 360 / WHEEL_SEGMENTS.length;
  const r = 130;
  const cx = 150, cy = 150;

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1a0a3d,#3b1070,#1a0a3d)", fontFamily:"'Nunito','Segoe UI',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", padding:"20px 16px" }}>
      <div style={{ width:"100%", maxWidth:400 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <div style={{ color:"#fff", fontWeight:900, fontSize:22 }}>🎡 Roue Bonus</div>
          <div style={{ color:"#A855F7", fontWeight:800 }}>{spinsLeft} tour{spinsLeft>1?"s":""} restant{spinsLeft>1?"s":""}</div>
        </div>

        {/* Flèche indicatrice */}
        <div style={{ textAlign:"center", fontSize:28, marginBottom:-8, position:"relative", zIndex:2 }}>▼</div>

        {/* Roue SVG */}
        <div style={{ display:"flex", justifyContent:"center", marginBottom:16 }}>
          <svg width="300" height="300" viewBox="0 0 300 300">
            <g transform={`rotate(${rotation}, ${cx}, ${cy})`} style={{ transition: phase==="spinning" ? "transform 3.5s cubic-bezier(0.17,0.67,0.21,0.99)" : "none" }}>
              {WHEEL_SEGMENTS.map((seg, i) => {
                const startAngle = (i * segAngle - 90) * Math.PI / 180;
                const endAngle = ((i + 1) * segAngle - 90) * Math.PI / 180;
                const x1 = cx + r * Math.cos(startAngle);
                const y1 = cy + r * Math.sin(startAngle);
                const x2 = cx + r * Math.cos(endAngle);
                const y2 = cy + r * Math.sin(endAngle);
                const midAngle = ((i + 0.5) * segAngle - 90) * Math.PI / 180;
                const tx = cx + (r * 0.65) * Math.cos(midAngle);
                const ty = cy + (r * 0.65) * Math.sin(midAngle);
                return (
                  <g key={i}>
                    <path d={`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`}
                      fill={seg.color} stroke="rgba(0,0,0,0.3)" strokeWidth="2" />
                    <text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle"
                      transform={`rotate(${(i+0.5)*segAngle}, ${tx}, ${ty})`}
                      fill="#fff" fontSize="11" fontWeight="800" style={{ userSelect:"none" }}>
                      {seg.label}
                    </text>
                  </g>
                );
              })}
              <circle cx={cx} cy={cy} r="22" fill="#1a1a2e" stroke="white" strokeWidth="3"/>
              <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fill="white" fontSize="18">🎡</text>
            </g>
          </svg>
        </div>

        {/* Résultat */}
        {winner && phase === "result" && (
          <div style={{ textAlign:"center", padding:"14px", background:`${winner.color}22`, border:`2px solid ${winner.color}`, borderRadius:18, marginBottom:16, animation:"popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)" }}>
            <div style={{ color:winner.color, fontWeight:900, fontSize:24 }}>{winner.label}</div>
            {winner.value >= 50 && <div style={{ fontSize:28, marginTop:4 }}>🎊🎊🎊</div>}
          </div>
        )}

        <div style={{ textAlign:"center" }}>
          {spinsLeft > 0 ? (
            <button onClick={spin} disabled={phase==="spinning"}
              style={{ padding:"15px 48px", borderRadius:16, background:phase==="spinning"?"rgba(255,255,255,0.2)":"linear-gradient(135deg,#A855F7,#7c3aed)", border:"none", color:"#fff", fontWeight:800, fontSize:17, cursor:phase==="spinning"?"not-allowed":"pointer", boxShadow:"0 4px 20px rgba(168,85,247,0.4)" }}>
              {phase==="spinning" ? "⏳ En rotation..." : "Tourner ! 🎡"}
            </button>
          ) : (
            <div>
              <div style={{ padding:"14px 28px", background:"rgba(255,215,0,0.15)", border:"1px solid rgba(255,215,0,0.4)", borderRadius:18, display:"inline-block", marginBottom:20 }}>
                <span style={{ color:"#FFD700", fontWeight:900, fontSize:28 }}>+{totalBonus} ⭐</span>
                <p style={{ color:"rgba(255,255,255,0.55)", fontSize:12, margin:"4px 0 0" }}>Total gagné !</p>
              </div>
              <br/>
              <button onClick={() => onEnd(totalBonus)} style={{ padding:"14px 40px", borderRadius:16, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:16, cursor:"pointer" }}>
                Retour
              </button>
            </div>
          )}
        </div>
      </div>
      <style>{`@keyframes popIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}`}</style>
    </div>
  );
}

// ─── SPEECH SYNTHESIS ────────────────────────────────────────────────────────────
function speak(text, lang = "fr-FR", rate = 0.9) {
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = rate; u.pitch = 1.1; u.volume = 1;
    // Choisir voix locale si dispo
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith(lang.slice(0,2)) && v.localService);
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  } catch {}
}
function stopSpeak() { try { window.speechSynthesis.cancel(); } catch {} }

// ─── SPEECH RECOGNITION HOOK ─────────────────────────────────────────────────────
function useSpeechRec(lang = "fr-FR", onResult) {
  const recRef = useRef(null);
  const [listening, setListening] = useState(false);
  const [supported] = useState(() => !!( window.SpeechRecognition || window.webkitSpeechRecognition));

  const start = useCallback(() => {
    if (!supported) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = lang; rec.continuous = false; rec.interimResults = false;
    rec.onresult = (e) => { const t = e.results[0][0].transcript; onResult(t); };
    rec.onend = () => setListening(false);
    rec.onerror = () => setListening(false);
    recRef.current = rec;
    try { rec.start(); setListening(true); } catch {}
  }, [lang, onResult, supported]);

  const stop = useCallback(() => { try { recRef.current?.stop(); } catch {} setListening(false); }, []);

  return { listening, supported, start, stop };
}

// ─── SAISONS ─────────────────────────────────────────────────────────────────────
function getCurrentSeason() {
  const m = new Date().getMonth(); // 0-11
  if (m >= 6 && m <= 8) return { id: "ete", label: "Été", emoji: "☀️", color: "#F59E0B" };
  if (m >= 9 && m <= 10) return { id: "toussaint", label: "Toussaint", emoji: "🍂", color: "#ea580c" };
  if (m >= 11 || m <= 0) return { id: "noel", label: "Noël", emoji: "⛄", color: "#60a5fa" };
  if (m >= 1 && m <= 2) return { id: "hiver", label: "Hiver", emoji: "❄️", color: "#93c5fd" };
  return { id: "printemps", label: "Printemps", emoji: "🌸", color: "#f9a8d4" };
}
function getSeasonKey() { const s = getCurrentSeason(); return `${new Date().getFullYear()}-${s.id}`; }

function checkSeasonReset(profile) {
  const curKey = getSeasonKey();
  if (profile.lastSeasonKey === curKey) return profile;
  // Nouvelle saison : archiver les badges, reset mini-jeux, garder étoiles
  const archived = [...(profile.seasonArchive || []), {
    season: profile.lastSeasonKey || "?",
    stars: profile.totalStars,
    badges: profile.earnedBadges || [],
  }];
  return {
    ...profile,
    lastSeasonKey: curKey,
    playedMinigames: {},       // reset déblocages
    seasonArchive: archived,
  };
}

    {a:"2×6",b:"12"},{a:"3×7",b:"21"},{a:"4×8",b:"32"},{a:"5×9",b:"45"},
    {a:"6×6",b:"36"},{a:"7×8",b:"56"},
  ]},
  { theme:"Capitales", pairs:[
    {a:"France",b:"Paris"},{a:"Espagne",b:"Madrid"},{a:"Italie",b:"Rome"},{a:"Allemagne",b:"Berlin"},
    {a:"Angleterre",b:"Londres"},{a:"Portugal",b:"Lisbonne"},
  ]},
  { theme:"Animaux 🇬🇧", pairs:[
    {a:"Cat",b:"Chat"},{a:"Dog",b:"Chien"},{a:"Horse",b:"Cheval"},{a:"Bird",b:"Oiseau"},
    {a:"Fish",b:"Poisson"},{a:"Rabbit",b:"Lapin"},
  ]},
  { theme:"Sciences", pairs:[
    {a:"H₂O",b:"Eau"},{a:"O₂",b:"Oxygène"},{a:"CO₂",b:"Carbone"},{a:"⭐",b:"Étoile"},
    {a:"🌱",b:"Plante"},{a:"🦋",b:"Insecte"},
  ]},
];

function MinigameMemory({ profile, onEnd }) {
  const deck = MEMORY_DECKS[Math.floor(Math.random() * MEMORY_DECKS.length)];
  // Créer 12 cartes (6 paires × 2)
  const makeCards = () => {
    const cards = [];
    deck.pairs.forEach((p, i) => {
      cards.push({ id: i*2,   pairId: i, text: p.a, side: "a" });
      cards.push({ id: i*2+1, pairId: i, text: p.b, side: "b" });
    });
    return cards.sort(() => Math.random() - 0.5);
  };

  const [cards] = useState(makeCards);
  const [flipped, setFlipped] = useState([]);   // indices des cartes retournées (actif)
  const [matched, setMatched] = useState([]);    // pairIds résolus
  const [moves, setMoves] = useState(0);
  const [phase, setPhase] = useState("intro");
  const [startTime, setStartTime] = useState(null);
  const lockRef = useRef(false);

  const flip = (idx) => {
    if (lockRef.current) return;
    if (flipped.includes(idx)) return;
    if (matched.includes(cards[idx].pairId)) return;

    const newFlipped = [...flipped, idx];
    setFlipped(newFlipped);

    if (newFlipped.length === 2) {
      setMoves(m => m + 1);
      lockRef.current = true;
      const [a, b] = newFlipped.map(i => cards[i]);
      if (a.pairId === b.pairId) {
        setTimeout(() => {
          setMatched(m => {
            const nm = [...m, a.pairId];
            if (nm.length === deck.pairs.length) setPhase("end");
            return nm;
          });
          setFlipped([]);
          lockRef.current = false;
        }, 600);
      } else {
        setTimeout(() => { setFlipped([]); lockRef.current = false; }, 900);
      }
    }
  };

  const timeElapsed = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
  const bonus = phase === "end" ? Math.max(15, 80 - moves * 3) : 0;
  const cardColors = ["#4ECDC4","#FF6B9D","#A855F7","#F59E0B","#10B981","#60a5fa"];

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0f172a,#1e3a5f,#0f172a)", fontFamily:"'Nunito','Segoe UI',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", padding:"20px 16px" }}>
      <div style={{ width:"100%", maxWidth:420 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <div style={{ color:"#fff", fontWeight:900, fontSize:20 }}>🧠 Mémoire</div>
          {phase === "play" && <div style={{ color:"rgba(255,255,255,0.6)", fontSize:13 }}>{matched.length}/{deck.pairs.length} paires • {moves} coups</div>}
        </div>

        {phase === "intro" && (
          <div style={{ textAlign:"center", paddingTop:30 }}>
            <div style={{ fontSize:72, animation:"bounce2 0.8s ease-in-out infinite" }}>🧠</div>
            <h2 style={{ color:"#fff", fontSize:22, fontWeight:900, marginTop:14 }}>Jeu de Mémoire</h2>
            <div style={{ background:"rgba(255,255,255,0.1)", borderRadius:14, padding:"12px 16px", margin:"16px 0", border:"1px solid rgba(255,255,255,0.15)" }}>
              <div style={{ color:"rgba(255,255,255,0.5)", fontSize:11, textTransform:"uppercase", letterSpacing:1 }}>Thème</div>
              <div style={{ color:"#fff", fontWeight:800, fontSize:18, marginTop:4 }}>{deck.theme}</div>
            </div>
            <p style={{ color:"rgba(255,255,255,0.6)", fontSize:14 }}>Retourne les cartes par paires. Moins de coups = plus de ⭐ !</p>
            <p style={{ color:"#4ECDC4", fontWeight:700, fontSize:13 }}>Jusqu'à +80⭐</p>
            <button onClick={() => { setPhase("play"); setStartTime(Date.now()); }}
              style={{ marginTop:20, padding:"14px 40px", borderRadius:16, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:16, cursor:"pointer" }}>
              Jouer ! 🧠
            </button>
          </div>
        )}

        {phase === "play" && (
          <>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:8 }}>
              {cards.map((card, idx) => {
                const isFlipped = flipped.includes(idx) || matched.includes(card.pairId);
                const isMatched = matched.includes(card.pairId);
                const color = cardColors[card.pairId % cardColors.length];
                return (
                  <div key={card.id} onClick={() => flip(idx)}
                    style={{ aspectRatio:"1", borderRadius:12, cursor:isMatched?"default":"pointer", perspective:600, position:"relative" }}>
                    <div style={{ width:"100%", height:"100%", position:"relative", transformStyle:"preserve-3d",
                      transform: isFlipped ? "rotateY(180deg)" : "rotateY(0deg)",
                      transition:"transform 0.35s ease" }}>
                      {/* Face cachée */}
                      <div style={{ position:"absolute", inset:0, borderRadius:12, backfaceVisibility:"hidden",
                        background:"linear-gradient(135deg,#1e3a5f,#0f172a)", border:"2px solid rgba(255,255,255,0.2)",
                        display:"flex", alignItems:"center", justifyContent:"center", fontSize:24 }}>
                        ❓
                      </div>
                      {/* Face révélée */}
                      <div style={{ position:"absolute", inset:0, borderRadius:12, backfaceVisibility:"hidden",
                        transform:"rotateY(180deg)",
                        background: isMatched ? `${color}33` : `${color}22`,
                        border:`2px solid ${isMatched ? color : color+"88"}`,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:13, fontWeight:800, color:"#fff", textAlign:"center", padding:4,

                        {card.text}

                    </div>
                  </div>
                );
              })}

          </>
        )}

        {phase === "end" && (
          <div style={{ textAlign:"center", paddingTop:20 }}>
            <div style={{ fontSize:64 }}>{moves <= 8 ? "🏆" : moves <= 12 ? "🥇" : "🎉"}</div>
            <h2 style={{ color:"#fff", fontSize:24, fontWeight:900, marginTop:10 }}>
              {moves <= 8 ? "Mémoire parfaite !" : moves <= 12 ? "Très bien !" : "Toutes les paires !"}
            </h2>
            <div style={{ display:"flex", justifyContent:"center", gap:20, margin:"16px 0", color:"rgba(255,255,255,0.6)", fontSize:14 }}>
              <span>🃏 {moves} coups</span>
              <span>⏱️ {timeElapsed}s</span>
            </div>
            <div style={{ padding:"14px 28px", background:"rgba(255,215,0,0.15)", border:"1px solid rgba(255,215,0,0.4)", borderRadius:18, display:"inline-block", marginBottom:24 }}>
              <span style={{ color:"#FFD700", fontWeight:900, fontSize:26 }}>+{bonus} ⭐</span>

            <button onClick={() => onEnd(bonus)} style={{ padding:"14px 40px", borderRadius:16, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:15, cursor:"pointer" }}>
              Retour
            </button>
          </div>
        )}
      </div>
    </div>
  );
}
