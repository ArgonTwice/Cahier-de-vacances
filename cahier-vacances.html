function MinigameBoss({ profile, onEnd }) {
  const theme = THEMES[profile.theme];
  const [phase, setPhase] = useState("intro");
  const [qIdx, setQIdx] = useState(0);
  const [lives, setLives] = useState(3);
  const [bossHp, setBossHp] = useState(100);
  const [score, setScore] = useState(0);
  const [selected, setSelected] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [bossState, setBossState] = useState("idle"); // idle|attack|hurt|dead
  const [bossMsg, setBossMsg] = useState("Tu oses défier le Maître des Savoirs ?!");
  const BOSS_MSGS_WRONG = ["Ha ha ha ! Tu pensais vraiment réussir ?!", "Encore raté ! La connaissance, ça s'apprend !", "Mon pouvoir grandit ! Continue d'échouer !"];
  const BOSS_MSGS_HURT  = ["Aïe ! Comment oses-tu ?!", "Impossible ! Tu m'as touché !", "Non non non ! Tu es trop fort !"];

  const q = BOSS_QUESTIONS[qIdx];
  const dmg = Math.floor(100 / BOSS_QUESTIONS.length);
  const subColor = SUBJECTS.find(s => s.id === q?.subject)?.color || "#fff";

  const answer = (choice) => {
    if (selected) return;
    setSelected(choice);
    const correct = choice === q.a;
    setFeedback(correct ? "correct" : "wrong");

    if (correct) {
      setBossHp(h => Math.max(0, h - dmg));
      setBossState("hurt");
      setBossMsg(BOSS_MSGS_HURT[Math.floor(Math.random() * BOSS_MSGS_HURT.length)]);
      setScore(s => s + 1);
    } else {
      setLives(l => l - 1);
      setBossState("attack");
      setBossMsg(BOSS_MSGS_WRONG[Math.floor(Math.random() * BOSS_MSGS_WRONG.length)]);
    }

    setTimeout(() => {
      setBossState("idle");
      const newLives = correct ? lives : lives - 1;
      const newBossHp = correct ? Math.max(0, bossHp - dmg) : bossHp;
      if (newLives <= 0) { setPhase("lose"); return; }
      if (qIdx + 1 >= BOSS_QUESTIONS.length || newBossHp <= 0) { setPhase("win"); return; }
      setSelected(null); setFeedback(null);
      setQIdx(i => i + 1);
    }, 1200);
  };

  const bossAnims = {
    idle:   "bossIdle 2s ease-in-out infinite",
    attack: "bossAttack 0.5s ease",
    hurt:   "bossHurt 0.4s ease",
    dead:   "none",
  };
  const bonus = phase === "win" ? score * 20 + (lives * 30) : score * 5;

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1a0000,#5c0000,#1a0000)", fontFamily:"'Nunito','Segoe UI',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", padding:"16px" }}>
      <style>{`
        @keyframes bossIdle{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.02)}}
        @keyframes bossAttack{0%{transform:scale(1) translateX(0)}30%{transform:scale(1.3) translateX(20px)}100%{transform:scale(1) translateX(0)}}
        @keyframes bossHurt{0%{transform:scale(1)}20%{transform:scale(0.8) rotate(-5deg)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
        @keyframes popIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
        @keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}100%{transform:translateX(0)}}
        @keyframes bounce2{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
      `}</style>
      <div style={{ width:"100%", maxWidth:400 }}>
        {phase === "intro" && (
          <div style={{ textAlign:"center", paddingTop:20 }}>
            <div style={{ fontSize:90, animation:"bossIdle 2s ease-in-out infinite", display:"inline-block" }}>🧙‍♂️</div>
            <h2 style={{ color:"#f87171", fontSize:24, fontWeight:900, marginTop:12 }}>⚔️ Boss Final !</h2>
            <h3 style={{ color:"#fff", fontSize:18, fontWeight:700, margin:"4px 0 12px" }}>Le Maître des Savoirs</h3>
            <div style={{ background:"rgba(248,113,113,0.15)", border:"1px solid rgba(248,113,113,0.4)", borderRadius:14, padding:"12px 16px", marginBottom:16 }}>
              <p style={{ color:"rgba(255,255,255,0.8)", fontSize:14, margin:0, lineHeight:1.6 }}>
                Tu as travaillé dur cet été. Il est temps d'affronter le Maître des Savoirs !<br/>
                <strong style={{ color:"#FFD700" }}>3 ❤️ • 10 questions • Toutes matières</strong>
              </p>
            </div>
            <p style={{ color:"#f87171", fontStyle:"italic", fontSize:14 }}>"{bossMsg}"</p>
            <button onClick={() => setPhase("play")} style={{ marginTop:16, padding:"15px 40px", borderRadius:16, background:"linear-gradient(135deg,#dc2626,#991b1b)", border:"none", color:"#fff", fontWeight:800, fontSize:16, cursor:"pointer", boxShadow:"0 4px 20px rgba(220,38,38,0.5)" }}>
              Combattre ! ⚔️
            </button>
          </div>
        )}

        {phase === "play" && q && (
          <>
            {/* HP bars */}
            <div style={{ display:"flex", gap:12, marginBottom:16 }}>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>
                  <span>🧙‍♂️ Boss</span><span>{bossHp}%</span>
                </div>
                <div style={{ height:10, background:"rgba(255,255,255,0.1)", borderRadius:99, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${bossHp}%`, background:"linear-gradient(90deg,#dc2626,#f87171)", borderRadius:99, transition:"width 0.5s ease" }}/>
                </div>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>
                  <span>❤️ Vies</span><span>{lives}/3</span>
                </div>
                <div style={{ display:"flex", gap:4 }}>
                  {[0,1,2].map(i => <span key={i} style={{ fontSize:20, filter:i<lives?"none":"grayscale(1) opacity(0.3)" }}>❤️</span>)}
                </div>
              </div>
            </div>

            {/* Boss */}
            <div style={{ textAlign:"center", marginBottom:12 }}>
              <div style={{ fontSize:72, display:"inline-block", animation:bossAnims[bossState],
                filter:bossState==="hurt"?"drop-shadow(0 0 20px #4ade80)":bossState==="attack"?"drop-shadow(0 0 20px #f87171)":"drop-shadow(0 4px 12px rgba(0,0,0,0.6))" }}>
                🧙‍♂️
              </div>
              <div style={{ background:"rgba(0,0,0,0.5)", backdropFilter:"blur(8px)", borderRadius:12, padding:"8px 14px", display:"inline-block", marginTop:6, maxWidth:"80%" }}>
                <p style={{ color: bossState==="hurt"?"#4ade80":bossState==="attack"?"#f87171":"rgba(255,255,255,0.8)", fontSize:13, fontWeight:700, margin:0, fontStyle:"italic" }}>
                  "{bossMsg}"
                </p>
              </div>
            </div>

            {/* Question */}
            <div style={{ background:"rgba(0,0,0,0.6)", backdropFilter:"blur(12px)", borderRadius:16, padding:"16px 14px", border:`1px solid ${subColor}44`, marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <span style={{ fontSize:11, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1 }}>Question {qIdx+1}/10</span>
                <span style={{ fontSize:12, color:subColor, fontWeight:700 }}>{SUBJECTS.find(s=>s.id===q.subject)?.emoji} {SUBJECTS.find(s=>s.id===q.subject)?.label}</span>
              </div>
              <p style={{ color:"#fff", fontSize:16, fontWeight:700, margin:0, lineHeight:1.5 }}>{q.q}</p>
            </div>

            {/* Choix */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              {q.choices.map((c, i) => {
                const isCorrect = c === q.a, isSel = c === selected;
                let bg="rgba(255,255,255,0.07)", border="rgba(255,255,255,0.15)";
                if (selected) {
                  if (isCorrect) { bg="rgba(74,222,128,0.2)"; border="#4ade80"; }
                  else if (isSel) { bg="rgba(248,113,113,0.2)"; border="#f87171"; }
                }
                return <button key={i} onClick={() => answer(c)} disabled={!!selected}
                  style={{ padding:"13px 10px", borderRadius:13, border:`2px solid ${border}`, background:bg, color:"#fff", cursor:"pointer", fontWeight:700, fontSize:14, transition:"all 0.15s",
                    animation: selected && isCorrect ? "popIn 0.3s ease" : selected && isSel ? "shake 0.3s ease" : "none" }}>
                  {c}
                </button>;
              })}
            </div>
          </>
        )}

        {(phase === "win" || phase === "lose") && (
          <div style={{ textAlign:"center", paddingTop:20 }}>
            <div style={{ fontSize:80, animation:"bounce2 1s ease-in-out infinite" }}>{phase==="win"?"🏆":"💀"}</div>
            <h2 style={{ color:phase==="win"?"#4ade80":"#f87171", fontSize:26, fontWeight:900, marginTop:12 }}>
              {phase==="win"?"Victoire ! Le Maître est vaincu !":"Défaite... mais tu reviendras !"}
            </h2>
            <p style={{ color:"rgba(255,255,255,0.6)", fontSize:14 }}>{score}/10 bonnes réponses • {lives} vie{lives>1?"s":""} restante{lives>1?"s":""}</p>
            <div style={{ padding:"14px 28px", background:"rgba(255,215,0,0.15)", border:"1px solid rgba(255,215,0,0.4)", borderRadius:18, display:"inline-block", margin:"16px 0" }}>
              <span style={{ color:"#FFD700", fontWeight:900, fontSize:26 }}>+{bonus} ⭐</span>
              {phase==="win"&&<p style={{ color:"rgba(255,255,255,0.5)", fontSize:12, margin:"4px 0 0" }}>+{lives*30}⭐ bonus vies sauvées !</p>}
            </div>
            <br/>
            <button onClick={() => onEnd(bonus)} style={{ padding:"14px 40px", borderRadius:16, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:15, cursor:"pointer" }}>
              Retour au camp !
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// Génère une question partagée, chaque tablette répond, les résultats s'affichent côte à côte
async function postDuoQuestion(pseudo, subjectId, level) {
  const duoId = `duo-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
  await sharedSet(`duo:active`, { duoId, host: pseudo, subjectId, level, ts: Date.now(), answers: {} });
  return duoId;
}

function DuoScreen({ profile, onBack, onEarnStars }) {
  const theme = THEMES[profile.theme];
  const [phase, setPhase] = useState("lobby"); // lobby|waiting|playing|results
  const [subjectId, setSubjectId] = useState("maths");
  const [duoData, setDuoData] = useState(null);
  const [q, setQ] = useState(null);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [opponentAnswer, setOpponentAnswer] = useState(null);
  const [loading, setLoading] = useState(false);
  const pollRef = useRef(null);

  const subject = SUBJECTS.find(s => s.id === subjectId);

  const hostGame = async () => {
    setLoading(true);
    try {
      setPhase("waiting");
      // Générer la question
      const qq = await generateQuestion(subjectId, profile.level);
      const duoId = `duo-${Date.now()}`;
      const data = { duoId, host: profile.pseudo, subjectId, question: qq, ts: Date.now(), answers: {} };
      await sharedSet(`duo:session`, data);
      setDuoData(data); setQ(qq);
      setPhase("playing");
      // Poller les réponses de l'adversaire
      pollRef.current = setInterval(async () => {
        try {
          const r = await window.storage.get(`duo:session`, true);
          if (!r) return;
          const d = JSON.parse(r.value);
          const opponent = Object.keys(d.answers || {}).find(k => k !== profile.pseudo);
          if (opponent) { setOpponentAnswer(d.answers[opponent]); }
        } catch {}
      }, 1500);
    } catch { setPhase("lobby"); }
    setLoading(false);
  };

  const joinGame = async () => {
    setLoading(true);
    try {
      const r = await window.storage.get(`duo:session`, true);
      if (!r) { alert("Aucune partie en cours. Demande à l'autre tablette d'en créer une !"); setLoading(false); return; }
      const d = JSON.parse(r.value);
      if (Date.now() - d.ts > 300000) { alert("La session a expiré."); setLoading(false); return; }
      setDuoData(d); setQ(d.question); setSubjectId(d.subjectId);
      setPhase("playing");
      pollRef.current = setInterval(async () => {
        try {
          const r2 = await window.storage.get(`duo:session`, true);
          if (!r2) return;
          const d2 = JSON.parse(r2.value);
          const opponent = Object.keys(d2.answers || {}).find(k => k !== profile.pseudo);
          if (opponent) setOpponentAnswer(d2.answers[opponent]);
        } catch {}
      }, 1500);
    } catch { alert("Erreur de connexion."); }
    setLoading(false);
  };

  const answer = async (choice) => {
    if (selected || !duoData) return;
    clearInterval(pollRef.current);
    setSelected(choice);
    const isCorrect = choice === q.answer;
    // Sauvegarder ma réponse
    try {
      const r = await window.storage.get(`duo:session`, true);
      if (r) {
        const d = JSON.parse(r.value);
        d.answers[profile.pseudo] = { choice, correct: isCorrect, ts: Date.now() };
        await sharedSet(`duo:session`, d);
      }
    } catch {}
    setRevealed(true);
    onEarnStars(isCorrect ? 10 : 0, isCorrect, 1, q.topic, 0);
  };

  useEffect(() => () => clearInterval(pollRef.current), []);

  const choiceColors = ["#4ECDC4","#FF6B9D","#A855F7","#F59E0B"];
  const opponentCorrect = opponentAnswer?.correct;
  const myCorrect = selected === q?.answer;

  return (
    <div style={{ minHeight:"100vh", background:theme.bg, fontFamily:"'Nunito','Segoe UI',sans-serif", display:"flex", flexDirection:"column" }}>
      <div style={{ padding:"14px 16px", display:"flex", alignItems:"center", gap:12, background:"rgba(0,0,0,0.3)", backdropFilter:"blur(10px)", borderBottom:`1px solid ${theme.border}33` }}>
        <button onClick={() => { clearInterval(pollRef.current); onBack(); }} style={{ background:"none", border:"none", color:"#fff", fontSize:24, cursor:"pointer" }}>←</button>
        <div style={{ color:"#fff", fontWeight:900, fontSize:18 }}>⚔️ Mode Duo</div>
        <div style={{ marginLeft:"auto", background:"rgba(255,215,0,0.15)", border:"1px solid rgba(255,215,0,0.3)", borderRadius:20, padding:"5px 12px", color:"#FFD700", fontWeight:800 }}>{profile.pseudo}</div>
      </div>

      <div style={{ flex:1, padding:"20px 16px" }}>
        {phase === "lobby" && (
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:64, marginBottom:12 }}>⚔️</div>
            <h2 style={{ color:"#fff", fontWeight:900, fontSize:22, marginBottom:6 }}>Défi 1v1 !</h2>
            <p style={{ color:"rgba(255,255,255,0.6)", fontSize:14, marginBottom:24 }}>Même question, deux tablettes. Qui répondra juste en premier ?</p>
            {/* Choisir matière */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:24 }}>
              {SUBJECTS.map(s => (
                <button key={s.id} onClick={() => setSubjectId(s.id)}
                  style={{ padding:"12px", borderRadius:12, border:`2px solid ${subjectId===s.id?s.color:"rgba(255,255,255,0.15)"}`, background:subjectId===s.id?`${s.color}22`:"rgba(255,255,255,0.07)", color:"#fff", cursor:"pointer", fontWeight:700, fontSize:13 }}>
                  {s.emoji} {s.label}
                </button>
              ))}
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={hostGame} disabled={loading}
                style={{ flex:1, padding:"14px", borderRadius:14, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:15, cursor:"pointer" }}>
                {loading ? "⏳..." : "Créer la partie 🎮"}
              </button>
              <button onClick={joinGame} disabled={loading}
                style={{ flex:1, padding:"14px", borderRadius:14, background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.25)", color:"#fff", fontWeight:800, fontSize:15, cursor:"pointer" }}>
                Rejoindre 🔗
              </button>
            </div>
            <p style={{ color:"rgba(255,255,255,0.35)", fontSize:12, marginTop:12 }}>+10⭐ si bonne réponse</p>
          </div>
        )}

        {phase === "waiting" && (
          <div style={{ textAlign:"center", paddingTop:60 }}>
            <div style={{ fontSize:48, animation:"spin 1s linear infinite", display:"inline-block" }}>⏳</div>
            <p style={{ color:"#fff", fontWeight:700, fontSize:18, marginTop:16 }}>Génération de la question...</p>
          </div>
        )}

        {phase === "playing" && q && (
          <>
            <div style={{ display:"flex", gap:8, marginBottom:16, justifyContent:"center" }}>
              <div style={{ padding:"6px 14px", borderRadius:20, background:`${theme.accent}22`, border:`1px solid ${theme.accent}44`, color:theme.accent, fontSize:12, fontWeight:700 }}>
                🎮 {profile.pseudo}
              </div>
              {opponentAnswer && (
                <div style={{ padding:"6px 14px", borderRadius:20, background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.2)", color:"rgba(255,255,255,0.7)", fontSize:12, fontWeight:700 }}>
                  ✓ Adversaire a répondu !
                </div>
              )}
            </div>

            <div style={{ background:"rgba(0,0,0,0.45)", backdropFilter:"blur(12px)", borderRadius:18, padding:"18px 16px", border:`1px solid ${subject?.color}44`, marginBottom:16 }}>
              <p style={{ color:"#fff", fontSize:17, fontWeight:700, margin:0, lineHeight:1.5 }}>{q.question}</p>
            </div>

            <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
              {(q.choices || []).map((c, i) => {
                const letter = ["A","B","C","D"][i];
                const isC = letter === q.answer, isSel = selected === letter;
                let bg="rgba(255,255,255,0.07)", border="rgba(255,255,255,0.15)";
                if (revealed) {
                  if (isC) { bg="rgba(74,222,128,0.22)"; border="#4ade80"; }
                  else if (isSel) { bg="rgba(248,113,113,0.22)"; border="#f87171"; }
                }

                  Retour à l'accueil

      </div>
      <style>{`@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}@keyframes popIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}`}</style>

// ─── BOUTON VOCAL dans QuizScreen ─────────────────────────────────────────────────
// Composant injecté dans le quiz existant
function VoiceButtons({ text, lang, onSpeech, subjectId, question, speechSupported }) {
  const [micState, setMicState] = useState("idle"); // idle|listening|done
  const recRef = useRef(null);

  const startListen = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    const rec = new SR();
    rec.lang = lang; rec.continuous = false; rec.interimResults = false;
    rec.onresult = (e) => { onSpeech(e.results[0][0].transcript); setMicState("done"); };
    rec.onend = () => setMicState("idle");
    rec.onerror = () => setMicState("idle");
    recRef.current = rec;
    try { rec.start(); setMicState("listening"); } catch { setMicState("idle"); }
  };

  const stopListen = () => { try { recRef.current?.stop(); } catch {} setMicState("idle"); };

  return (
    <div style={{ display:"flex", gap:8, marginBottom:8 }}>
      {/* TTS */}
      <button onClick={() => speak(text, lang)}
        style={{ padding:"8px 14px", borderRadius:10, background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.2)", color:"#fff", cursor:"pointer", fontSize:14, display:"flex", alignItems:"center", gap:6, fontWeight:600 }}>
        🔊 <span style={{ fontSize:12 }}>Écouter</span>
      </button>
      {/* STT — uniquement pour questions ouvertes FR/EN */}
      {(subjectId === "francais" || subjectId === "anglais") && speechSupported && (
        <button onClick={micState === "listening" ? stopListen : startListen}
          style={{ padding:"8px 14px", borderRadius:10, background:micState==="listening"?"rgba(248,113,113,0.3)":"rgba(255,255,255,0.1)", border:`1px solid ${micState==="listening"?"#f87171":"rgba(255,255,255,0.2)"}`, color:micState==="listening"?"#f87171":"#fff", cursor:"pointer", fontSize:14, display:"flex", alignItems:"center", gap:6, fontWeight:600, animation:micState==="listening"?"micPulse 0.8s ease-in-out infinite":"none" }}>
          🎤 <span style={{ fontSize:12 }}>{micState==="listening"?"Stop":"Répondre"}</span>
        </button>
      )}
      <style>{`@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.5)}50%{box-shadow:0 0 0 8px rgba(248,113,113,0)}}`}</style>
    </div>
  );
}

function parseSeasonKey(key) {
  if (!key) return { year:"?", id:"ete" };
  const parts = key.split("-");
  return { year: parts[0], id: parts[1] || "ete" };
}

function SeasonBadge({ stars, correct, total }) {
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  if (stars >= 500) return { emoji:"🏆", label:"Champion", color:"#FFD700" };
  if (stars >= 200) return { emoji:"⭐", label:"Expert",   color:"#f59e0b" };
  if (stars >= 100) return { emoji:"🥇", label:"Avancé",   color:"#4ade80" };
  if (stars >=  50) return { emoji:"📚", label:"Studieux", color:"#60a5fa" };
  return { emoji:"🌱", label:"Débutant", color:"#94a3b8" };
}

        {/* Liste chapitres */}
        {STORY_CHAPTERS.map((chapter, i) => {
          const unlocked = total >= chapter.threshold;
          const isClaimed = claimed.includes(chapter.id);
          const isNext = !unlocked && (i === 0 || total >= STORY_CHAPTERS[i-1].threshold);
          return (
            <div key={chapter.id} style={{ marginBottom:10, borderRadius:18, overflow:"hidden",
              opacity: unlocked ? 1 : 0.55,
              border:`1px solid ${unlocked ? chapter.color+"55" : "rgba(255,255,255,0.1)"}`,
              boxShadow: unlocked ? `0 4px 16px ${chapter.color}22` : "none" }}>
              <div onClick={() => unlocked && unlockAndRead(chapter)}
                style={{ background: unlocked ? `${chapter.color}18` : "rgba(255,255,255,0.05)",
                  padding:"14px 16px", cursor: unlocked ? "pointer" : "default",
                  display:"flex", alignItems:"center", gap:12 }}>
                {/* Icône chapitre */}
                <div style={{ width:48, height:48, borderRadius:14, background: unlocked ? `${chapter.color}33` : "rgba(255,255,255,0.1)",
                  border:`2px solid ${unlocked ? chapter.color : "rgba(255,255,255,0.15)"}`,
                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, flexShrink:0 }}>
                  {unlocked ? chapter.emoji : "🔒"}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ color:"rgba(255,255,255,0.4)", fontSize:11 }}>Chapitre {chapter.id}</span>
                    {isClaimed && <span style={{ fontSize:11, color:"#4ade80", fontWeight:700 }}>✓ Lu</span>}
                    {!unlocked && isNext && <span style={{ fontSize:10, background:"rgba(255,215,0,0.2)", color:"#FFD700", borderRadius:99, padding:"2px 7px", fontWeight:700 }}>Prochain !</span>}
                  </div>
                  <div style={{ color:"#fff", fontWeight:800, fontSize:14, marginTop:1 }}>{chapter.title}</div>
                  {unlocked ? (
                    <div style={{ color:chapter.color, fontSize:11, marginTop:2 }}>{chapter.reward}</div>
                  ) : (
                    <div style={{ color:"rgba(255,255,255,0.35)", fontSize:11, marginTop:2 }}>
                      🔒 Déblocage à {chapter.threshold} questions ({Math.max(0, chapter.threshold - total)} restantes)
                    </div>
                  )}
                </div>
                {unlocked && <span style={{ color:chapter.color, fontSize:20 }}>{isClaimed ? "📖" : "✨"}</span>}
              </div>
              {/* Barre de progression vers ce chapitre */}
              {!unlocked && isNext && (
                <div style={{ padding:"8px 16px 12px", background:"rgba(0,0,0,0.3)" }}>
                  <div style={{ height:5, background:"rgba(255,255,255,0.08)", borderRadius:99, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:`${Math.min(100,(total/chapter.threshold)*100)}%`,
                      background:`${chapter.color}88`, borderRadius:99, transition:"width 0.5s" }}/>
                  </div>
                  <div style={{ color:"rgba(255,255,255,0.3)", fontSize:10, marginTop:4, textAlign:"right" }}>
                    {total}/{chapter.threshold} questions
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── RAPPEL QUOTIDIEN ─────────────────────────────────────────────────────────
// Pas de push natif dans artifact — on affiche un badge et une popup à l'ouverture
function DailyReminderBanner({ profile, onDismiss, onSettings }) {
  const last = profile.lastVisit || 0;
  const today = new Date().toDateString();
  const lastDate = new Date(last).toDateString();
  const missedDays = last === 0 ? 0 : Math.floor((Date.now() - last) / 86400000);

  if (missedDays < 1) return null; // déjà visité aujourd'hui
  return (
    <div style={{ margin:"0 0 12px", padding:"12px 16px", borderRadius:14,
      background: missedDays >= 3 ? "rgba(220,38,38,0.18)" : "rgba(251,146,60,0.18)",
      border:`1px solid ${missedDays >= 3 ? "rgba(220,38,38,0.5)" : "rgba(251,146,60,0.5)"}`,
      animation:"fadeUp 0.4s ease" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:24 }}>{missedDays >= 3 ? "😴" : "⏰"}</span>
          <div>
            <div style={{ color:"#fff", fontWeight:800, fontSize:14 }}>
              {missedDays >= 3 ? `${missedDays} jours sans révisions !` : "Bienvenue ! Tu étais absent hier 👋"}
            </div>
            <div style={{ color:"rgba(255,255,255,0.6)", fontSize:12 }}>
              {missedDays >= 3 ? "Ton stade/ta ville t'attend..." : "Quelques questions pour se remettre en route ?"}
            </div>
          </div>
        </div>
        <button onClick={onDismiss} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.4)", fontSize:20, cursor:"pointer" }}>×</button>
      </div>
    </div>
  );
}

function ReminderSettingsScreen({ profile, onBack, onSave }) {
  const [hour, setHour] = useState(profile.reminderHour ?? 10);
  const [enabled, setEnabled] = useState(profile.reminderEnabled ?? false);

  return (
    <div style={{ minHeight:"100vh", background:THEMES[profile.theme].bg, fontFamily:"'Nunito','Segoe UI',sans-serif", display:"flex", flexDirection:"column" }}>
      <div style={{ padding:"14px 18px", display:"flex", alignItems:"center", gap:12, background:"rgba(0,0,0,0.3)", backdropFilter:"blur(10px)", borderBottom:`1px solid ${THEMES[profile.theme].border}33` }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:"#fff", fontSize:24, cursor:"pointer" }}>←</button>
        <div style={{ color:"#fff", fontWeight:900, fontSize:18 }}>⏰ Rappels quotidiens</div>
      </div>
      <div style={{ flex:1, padding:"24px 18px" }}>
        <div style={{ background:"rgba(255,255,255,0.07)", borderRadius:20, padding:"20px", border:"1px solid rgba(255,255,255,0.12)", marginBottom:16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
            <div>
              <div style={{ color:"#fff", fontWeight:800, fontSize:16 }}>Rappel d'entraînement</div>
              <div style={{ color:"rgba(255,255,255,0.5)", fontSize:13, marginTop:2 }}>Affiche un badge au prochain lancement</div>
            </div>
            <button onClick={() => setEnabled(e => !e)}
              style={{ width:52, height:28, borderRadius:99, background:enabled?"#4ade80":"rgba(255,255,255,0.2)", border:"none", cursor:"pointer", position:"relative", transition:"background 0.3s" }}>
              <div style={{ width:22, height:22, borderRadius:"50%", background:"#fff", position:"absolute", top:3, left: enabled ? 27 : 3, transition:"left 0.3s", boxShadow:"0 2px 4px rgba(0,0,0,0.3)" }}/>
            </button>
          </div>
          {enabled && (
            <div>
              <div style={{ color:"rgba(255,255,255,0.6)", fontSize:13, marginBottom:10 }}>Heure cible :</div>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <input type="range" min={6} max={21} value={hour} onChange={e => setHour(+e.target.value)}
                  style={{ flex:1, accentColor:"#FFD700" }}/>
                <div style={{ color:"#FFD700", fontWeight:900, fontSize:22, minWidth:60, textAlign:"center" }}>{hour}h00</div>
              </div>
              <div style={{ marginTop:12, padding:"10px 14px", background:"rgba(255,215,0,0.1)", borderRadius:10, border:"1px solid rgba(255,215,0,0.3)" }}>
                <p style={{ color:"rgba(255,255,255,0.6)", fontSize:12, margin:0 }}>
                  ℹ️ Sans accès aux notifications système, le rappel s'affiche comme badge rouge quand tu ouvres l'app après {hour}h si tu n'as pas encore révisé aujourd'hui.
                </p>
              </div>
            </div>
          )}
        </div>
        <button onClick={() => onSave({ reminderEnabled: enabled, reminderHour: hour })}
          style={{ width:"100%", padding:"14px", borderRadius:14, background:"linear-gradient(135deg,#FFD700,#FF8C00)", border:"none", color:"#1a1a1a", fontWeight:800, fontSize:15, cursor:"pointer" }}>
          Enregistrer ✓
        </button>
      </div>
    </div>
  );
}

// ─── APP v6 ───────────────────────────────────────────────────────────────────
function App(){
  const [screen, setScreen]   = useState("loading");
  const [profile, setProfile] = useState(null);
  const [quizSubject, setQuizSubject] = useState(null);
  const [forceTopic, setForceTopic]   = useState(null);
  const [examMode, setExamMode]       = useState(false);
  const [sessionResult, setSessionResult] = useState(null);
  const [sessionStars, setSessionStars]   = useState(0);
  const [activeMG, setActiveMG] = useState(null);
  const [reminderDismissed, setReminderDismissed] = useState(false);

  useEffect(() => {
    let p = loadProfile();
    if (p) {
      p = checkSeasonReset(p);
      // Marquer la visite
      p = { ...p, lastVisit: Date.now() };
      saveProfile(p);
      // Propagate storyClaimed
      if (!p.storyClaimed) p = { ...p, storyClaimed: [] };
    }
    setProfile(p);
    setScreen(p ? "home" : "setup");
  }, []);

  const update = (fn) => { setProfile(prev => { const next = fn(prev); saveProfile(next); return next; }); };

  const handleSetup = (p) => {
    const base = { ...checkSeasonReset(p), lastVisit: Date.now(), storyClaimed: [] };
    saveProfile(base); setProfile(base); setScreen("home");
  };
  const handleSubject = (sid, topic=null, exam=false) => {
    setQuizSubject(sid); setForceTopic(topic); setExamMode(exam); setSessionStars(0); setScreen("quiz");
  };
  const handleRetry = (topic) => handleSubject("maths", topic, false);
  const handleExam  = () => handleSubject("mix", null, true);
  const handlePlayMG = (mgId) => {
    update(prev => { const pm={...(prev.playedMinigames||{})}; pm[mgId]=prev.stats.total; return{...prev,playedMinigames:pm}; });
    setActiveMG(mgId);
  };
  const handleMGEnd = (bonus) => {
    if (bonus > 0) {
      const weekId = getWeekId();
      update(prev => { const ws={...(prev.weeklyStars||{})}; ws[weekId]=(ws[weekId]||0)+bonus; return{...prev,stars:prev.stars+bonus,totalStars:prev.totalStars+bonus,weeklyStars:ws}; });
    }
    setActiveMG(null); setScreen("home");
  };
  const handleEarnStars = useCallback((stars, isCorrect, total, topic, ns) => {
    setSessionStars(s => s + stars);
    const weekId = getWeekId();
    update(prev => {
      const ws={...(prev.weeklyStars||{})}; ws[weekId]=(ws[weekId]||0)+stars;
      const wt={...(prev.weakTopics||{})};
      if(topic){const t=wt[topic]||{correct:0,total:0};wt[topic]={correct:t.correct+(isCorrect?1:0),total:t.total+total};}
      const eb=[...(prev.earnedBadges||[])];
      const badge=STREAK_BADGES.find(b=>b.streak===ns);
      if(badge&&!eb.find(b=>b.streak===badge.streak))eb.push(badge);
      return{...prev,stars:prev.stars+stars,totalStars:prev.totalStars+stars,weeklyStars:ws,weakTopics:wt,
        streak:ns,maxStreak:Math.max(prev.maxStreak||0,ns),earnedBadges:eb,
        stats:{...prev.stats,correct:prev.stats.correct+(isCorrect?1:0),total:prev.stats.total+total}};
    });
  }, []);
  const handleQuizBack = (score, total) => {
    setSessionResult({score,total});
    update(prev=>({...prev,stats:{...prev.stats,sessions:prev.stats.sessions+1}}));
    setScreen("result");
  };
  const handleBuy   = (item) => update(prev=>({...prev,stars:prev.stars-item.cost,owned:[...prev.owned,item.id]}));
  const handleReset = () => { localStorage.removeItem("vacances_v5"); localStorage.removeItem("vacances_v6"); setProfile(null); setScreen("setup"); };
  const handleSaveReminder = (settings) => { update(prev=>({...prev,...settings})); setScreen("home"); };

  // Mini-jeux
  if(activeMG==="penalty"  &&profile) return <MinigamePenalty  profile={profile} onEnd={handleMGEnd}/>;
  if(activeMG==="wordsnap" &&profile) return <MinigameWordSnap  profile={profile} onEnd={handleMGEnd}/>;
  if(activeMG==="flashquiz"&&profile) return <MinigameFlashQuiz profile={profile} onEnd={handleMGEnd}/>;
  if(activeMG==="wheel"    &&profile) return <MinigameWheel     profile={profile} onEnd={handleMGEnd}/>;
  if(activeMG==="memory"   &&profile) return <MinigameMemory    profile={profile} onEnd={handleMGEnd}/>;
  if(activeMG==="boss"     &&profile) return <MinigameBoss      profile={profile} onEnd={handleMGEnd}/>;

  if(screen==="loading") return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#1a1a2e",fontFamily:"'Nunito',sans-serif"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:52}}>🌴</div><p style={{color:"rgba(255,255,255,0.4)",marginTop:12}}>Chargement...</p></div>
    </div>
  );

  if(screen==="setup") return <SetupScreen onComplete={handleSetup}/>;

  if(screen==="home"&&profile){
    // Injecter le banner rappel dans HomeScreen via prop
    return <HomeScreen profile={profile} onSubject={handleSubject} onRetry={handleRetry}
      onShop={()=>setScreen("shop")} onLeaderboard={()=>setScreen("leaderboard")}
      onExam={handleExam} onReset={handleReset} onPlayMG={handlePlayMG}
      onDuo={()=>setScreen("duo")} onBoss={()=>handlePlayMG("boss")}
      onSeasons={()=>setScreen("seasons")} onStory={()=>setScreen("story")}
      onReminderSettings={()=>setScreen("reminder")}
      reminderDismissed={reminderDismissed} onDismissReminder={()=>setReminderDismissed(true)}/>;
  }

  if(screen==="quiz"&&profile) return(
    <QuizScreen profile={profile} subjectId={quizSubject} forceTopic={forceTopic}
      examMode={examMode} onBack={handleQuizBack} onEarnStars={handleEarnStars} voiceEnabled={true}/>
  );
  if(screen==="result"&&sessionResult&&profile) return(
    <ResultScreen score={sessionResult.score} total={sessionResult.total}
      starsEarned={sessionStars} theme={profile.theme} weekend={isWeekend()}
      examMode={examMode} onHome={()=>setScreen("home")}/>
  );
  if(screen==="shop"        &&profile) return <ShopScreen        profile={profile} onBack={()=>setScreen("home")} onBuy={handleBuy}/>;
  if(screen==="leaderboard" &&profile) return <LeaderboardScreen profile={profile} onBack={()=>setScreen("home")}/>;
  if(screen==="duo"         &&profile) return <DuoScreen         profile={profile} onBack={()=>setScreen("home")} onEarnStars={handleEarnStars}/>;
  if(screen==="seasons"     &&profile) return <SeasonsScreen     profile={profile} onBack={()=>setScreen("home")}/>;
  if(screen==="story"       &&profile) return <StoryScreen       profile={profile} onBack={()=>setScreen("home")} onEarnStars={handleEarnStars}/>;
  if(screen==="reminder"    &&profile) return <ReminderSettingsScreen profile={profile} onBack={()=>setScreen("home")} onSave={handleSaveReminder}/>;

  return null;
}

</script>
